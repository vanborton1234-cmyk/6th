<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنجازاتي | Enjazati Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        :root {
            --primary: #00f2ff; --accent: #7000ff; --bg: #05060a; --card: rgba(20, 25, 30, 0.9);
        }

        body {
            font-family: 'Tajawal', sans-serif; margin: 0; background: var(--bg);
            color: #fff; overflow: hidden; height: 100vh;
        }

        /* خلفية الذرات المتحركة */
        #atom-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* شريط السشن الحالي */
        #session-bar {
            background: linear-gradient(90deg, var(--accent), var(--primary));
            padding: 10px; text-align: center; font-weight: bold; font-size: 14px;
            box-shadow: 0 0 20px var(--primary); z-index: 1000; position: relative;
        }

        /* حاوية الشات */
        .chat-container {
            display: flex; flex-direction: column; height: calc(100vh - 120px);
            max-width: 700px; margin: auto; position: relative;
        }

        .messages-area {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
            scrollbar-width: none;
        }

        /* فقاعات الرسائل */
        .msg { max-width: 85%; position: relative; animation: pop 0.3s ease; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } }
        
        .msg-content { padding: 10px 15px; border-radius: 18px; position: relative; font-size: 15px; }
        .msg-in { align-self: flex-start; background: #1e1f24; border: 1px solid #333; }
        .msg-out { align-self: flex-end; background: var(--accent); }
        
        .user-info { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 12px; }
        .avatar-sm { width: 25px; height: 25px; border-radius: 50%; object-fit: cover; }
        
        .del-msg { color: #ff4d4d; font-size: 12px; cursor: pointer; margin-right: 8px; display: none; }
        .msg-out:hover .del-msg { display: inline; }

        /* رسالة السشن الآلية */
        .system-msg {
            align-self: center; background: rgba(0, 242, 255, 0.1);
            border: 1px dashed var(--primary); padding: 5px 20px;
            border-radius: 50px; font-size: 13px; color: var(--primary); margin: 10px 0;
        }

        /* منطقة الإدخال */
        .input-area {
            padding: 15px; background: var(--card); backdrop-filter: blur(10px);
            display: flex; gap: 10px; align-items: center;
        }
        .input-area input {
            flex: 1; background: #000; border: 1px solid #444; padding: 12px;
            border-radius: 25px; color: #fff; outline: none;
        }

        /* شاشة الدخول / الإعدادات */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<canvas id="atom-canvas"></canvas>

<div id="session-bar">جاري فحص الوقت...</div>

<div class="chat-container">
    <div class="messages-area" id="chat-box"></div>
    
    <div class="input-area">
        <label for="file-input"><i class="fas fa-paperclip" style="cursor:pointer; font-size:20px;"></i></label>
        <input type="file" id="file-input" hidden accept="image/*,video/*" onchange="uploadMedia(this)">
        <input type="text" id="msg-input" placeholder="أرسل إنجازك الآن...">
        <button onclick="sendText()" style="background:var(--primary); border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;">
            <i class="fas fa-paper-plane" style="color:#000;"></i>
        </button>
        <i class="fas fa-cog" onclick="showSettings()" style="cursor:pointer; font-size:20px;"></i>
    </div>
</div>

<div id="login-overlay" class="overlay" style="display:none;">
    <div style="background:var(--card); padding:30px; border-radius:20px; text-align:center; width:90%; max-width:350px; border:1px solid var(--primary);">
        <h2 style="color:var(--primary)">إنجازاتي ⚛️</h2>
        <img id="preview" src="https://via.placeholder.com/100" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--primary); cursor:pointer;" onclick="document.getElementById('avatar-file').click()">
        <input type="file" id="avatar-file" hidden accept="image/*" onchange="previewAvatar(this)">
        <input type="text" id="user-name" placeholder="ما هو اسمك؟" style="width:100%; padding:12px; margin:20px 0; border-radius:10px; border:1px solid #444; background:#000; color:white;">
        <button onclick="saveUser()" style="width:100%; padding:12px; background:var(--primary); border:none; border-radius:10px; font-weight:bold;">ابدأ الإنجاز</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLtjHJIMkLE3CE_WZSDpWQTx_cpTcpycM",
        authDomain: "studyproject-1466b.firebaseapp.com",
        projectId: "studyproject-1466b",
        storageBucket: "studyproject-1466b.firebasestorage.app",
        messagingSenderId: "589724771483",
        appId: "1:589724771483:web:1c53636da586d2c787923e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- نظام الذرات ---
    const canvas = document.getElementById('atom-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = [];
    class Particle {
        constructor() { this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.vx=(Math.random()-0.5)*2; this.vy=(Math.random()-0.5)*2; }
        update() { this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>canvas.width)this.vx*=-1; if(this.y<0||this.y>canvas.height)this.vy*=-1; }
        draw() { ctx.fillStyle="#00f2ff"; ctx.beginPath(); ctx.arc(this.x,this.y,1,0,Math.PI*2); ctx.fill(); }
    }
    for(let i=0; i<60; i++) particles.push(new Particle());
    function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(animate); }
    animate();

    // --- بيانات المستخدم ---
    let myProfile = JSON.parse(localStorage.getItem('enjaz_live_v1'));
    if(!myProfile) { document.getElementById('login-overlay').style.display='flex'; }

    window.previewAvatar = (input) => {
        const r = new FileReader(); r.onload=(e)=>document.getElementById('preview').src=e.target.result; r.readAsDataURL(input.files[0]);
    };

    window.saveUser = () => {
        const name = document.getElementById('user-name').value;
        const photo = document.getElementById('preview').src;
        if(!name) return;
        myProfile = { name, photo, id: 'user_' + Math.random().toString(36).substr(2, 9) };
        localStorage.setItem('enjaz_live_v1', JSON.stringify(myProfile));
        location.reload();
    };

    window.showSettings = () => { document.getElementById('login-overlay').style.display='flex'; };

    // --- نظام السشنات (حسب توقيت العراق) ---
    const schedule = [
        { name: "السشن الأول", start: "06:00", end: "08:00" },
        { name: "وقت راحة ☕", start: "08:00", end: "08:15" },
        { name: "السشن الثاني", start: "08:15", end: "10:15" },
        { name: "وقت راحة ☕", start: "10:15", end: "10:30" },
        { name: "السشن الثالث", start: "10:30", end: "12:00" },
        { name: "السشن الثالث (ب)", start: "13:00", end: "15:00" },
        { name: "وقت راحة ☕", start: "15:00", end: "15:15" },
        { name: "السشن الرابع", start: "15:15", end: "17:15" },
        { name: "وقت راحة ☕", start: "17:15", end: "17:30" },
        { name: "السشن الخامس", start: "17:30", end: "18:30" },
        { name: "السشن السادس", start: "20:00", end: "22:00" }
    ];

    let lastAnnouncedSession = "";

    function checkTime() {
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        let currentSess = null;

        for(let s of schedule) {
            if(timeStr >= s.start && timeStr < s.end) {
                currentSess = s; break;
            }
        }

        const bar = document.getElementById('session-bar');
        if(currentSess) {
            bar.innerText = `⚡ ${currentSess.name} | ينتهي الساعة ${currentSess.end}`;
            if(lastAnnouncedSession !== currentSess.name) {
                sendSystemMsg(`🚀 بدأ الآن: ${currentSess.name} (${currentSess.start} - ${currentSess.end})`);
                lastAnnouncedSession = currentSess.name;
            }
        } else {
            bar.innerText = `⏳ لا يوجد سشن حالياً.. استعد للقادم!`;
        }

        // الحذف التلقائي اليومي (يفحص إذا تغير اليوم)
        const today = now.toLocaleDateString();
        if(localStorage.getItem('last_clear') !== today) {
            set(ref(db, 'live_chat'), {}); // مسح الشات في فايربيس
            localStorage.setItem('last_clear', today);
        }
    }
    setInterval(checkTime, 1000);

    // --- وظائف المراسلة ---
    function sendSystemMsg(text) {
        push(ref(db, 'live_chat'), { type: 'system', text, time: serverTimestamp() });
    }

    window.sendText = () => {
        const txt = document.getElementById('msg-input').value;
        if(!txt) return;
        push(ref(db, 'live_chat'), {
            uid: myProfile.id, user: myProfile.name, photo: myProfile.photo,
            text: txt, type: 'text', time: serverTimestamp()
        });
        document.getElementById('msg-input').value = "";
    };

    window.uploadMedia = (input) => {
        const file = input.files[0];
        const reader = new FileReader();
        const type = file.type.startsWith('image') ? 'image' : 'video';
        reader.onload = (e) => {
            push(ref(db, 'live_chat'), {
                uid: myProfile.id, user: myProfile.name, photo: myProfile.photo,
                media: e.target.result, mType: type, type: 'media', time: serverTimestamp()
            });
        };
        reader.readAsDataURL(file);
    };

    window.deleteMsg = (key) => {
        if(confirm("حذف هذه الرسالة؟")) remove(ref(db, `live_chat/${key}`));
    };

    // --- جلب الرسائل مباشرة ---
    onValue(ref(db, 'live_chat'), (snap) => {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        snap.forEach(child => {
            const d = child.val();
            const key = child.key;
            
            if(d.type === 'system') {
                box.innerHTML += `<div class="system-msg">${d.text}</div>`;
            } else {
                const isMe = d.uid === myProfile.id;
                let content = d.type === 'media' ? 
                    (d.mType === 'image' ? `<img src="${d.media}" style="width:100%; border-radius:10px;">` : `<video src="${d.media}" controls style="width:100%; border-radius:10px;"></video>`)
                    : d.text;

                box.innerHTML += `
                    <div class="msg ${isMe ? 'msg-out' : 'msg-in'}">
                        <div class="user-info">
                            <img src="${d.photo}" class="avatar-sm">
                            <b style="color:var(--primary)">${d.user}</b>
                        </div>
                        <div class="msg-content">
                            ${isMe ? `<i class="fas fa-trash del-msg" onclick="deleteMsg('${key}')"></i>` : ''}
                            ${content}
                        </div>
                    </div>
                `;
            }
        });
        box.scrollTop = box.scrollHeight;
    });

</script>
</body>
</html>
