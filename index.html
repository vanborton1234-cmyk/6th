<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة Snowstorm التعليمية</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, button { padding: 10px; margin: 5px 0; width: 100%; }
        .video-card { border-bottom: 1px solid #ccc; padding: 10px 0; }
        #comments-section { margin-top: 20px; background: #eee; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>مرحباً بك في Snowstorm ❄️</h1>

    <div id="auth-section">
        <h3>تسجيل الدخول / إنشاء حساب</h3>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button id="btnSignup">إنشاء حساب</button>
        <button id="btnLogin">تسجيل دخول</button>
    </div>

    <hr>

    <div id="admin-section">
        <h3>إضافة فيديو جديد</h3>
        <input type="text" id="videoTitle" placeholder="عنوان الفيديو">
        <input type="text" id="videoLink" placeholder="رابط فيديو YouTube">
        <button id="btnUpload">نشر الفيديو</button>
    </div>

    <hr>

    <h3>الفيديوهات الدراسية</h3>
    <div id="video-list"></div>

    <hr>

    <div id="comments-section">
        <h3>التعليقات والاستفسارات</h3>
        <div id="display-comments"></div>
        <input type="text" id="userComment" placeholder="اكتب تعليقك هنا...">
        <button id="btnComment">إرسال التعليق</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBLtjHJIMkLE3CE_WZSDpWQTx_cpTcpycM",
    authDomain: "studyproject-1466b.firebaseapp.com",
    projectId: "studyproject-1466b",
    storageBucket: "studyproject-1466b.firebasestorage.app",
    messagingSenderId: "589724771483",
    appId: "1:589724771483:web:1c53636da586d2c787923e"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);
  const auth = getAuth(app);

  // --- وظيفة تسجيل الدخول ---
  document.getElementById('btnSignup').onclick = () => {
      createUserWithEmailAndPassword(auth, email.value, password.value).then(() => alert("تم إنشاء الحساب!"));
  };
  document.getElementById('btnLogin').onclick = () => {
      signInWithEmailAndPassword(auth, email.value, password.value).then(() => alert("تم الدخول!"));
  };

  // --- وظيفة رفع الفيديوهات ---
  document.getElementById('btnUpload').onclick = () => {
      const vRef = ref(database, 'videos');
      push(vRef, { title: videoTitle.value, url: videoLink.value });
      alert("تم نشر الفيديو");
  };

  // --- وظيفة عرض الفيديوهات تلقائياً ---
  onValue(ref(database, 'videos'), (snapshot) => {
      const data = snapshot.val();
      const list = document.getElementById('video-list');
      list.innerHTML = "";
      for (let id in data) {
          list.innerHTML += `<div class="video-card"><h4>${data[id].title}</h4><a href="${data[id].url}" target="_blank">مشاهدة الفيديو</a></div>`;
      }
  });

  // --- وظيفة التعليقات ---
  document.getElementById('btnComment').onclick = () => {
      const cRef = ref(database, 'comments');
      push(cRef, { text: userComment.value });
      userComment.value = "";
  };

  onValue(ref(database, 'comments'), (snapshot) => {
      const data = snapshot.val();
      const div = document.getElementById('display-comments');
      div.innerHTML = "";
      for (let id in data) {
          div.innerHTML += `<p>💬 ${data[id].text}</p>`;
      }
  });

</script>
</body>
</html>
