<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنصة العلمية الذكية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        
        :root {
            --primary: #00ffcc;
            --secondary: #0088ff;
            --bg: #05060a;
            --card-bg: rgba(20, 25, 35, 0.9);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0; background: var(--bg); color: #fff;
            overflow-x: hidden;
        }

        /* ذرات متحركة */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at center, #102030 0%, #05060a 100%);
        }

        .container { max-width: 850px; margin: auto; padding: 20px; }

        /* تسجيل الدخول بالاسم */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: var(--card-bg); padding: 30px; border-radius: 20px;
            border: 2px solid var(--primary); text-align: center; width: 300px;
        }

        /* كروت الفيديوهات (ستايل فيسبوك) */
        .video-card {
            background: var(--card-bg); border-radius: 15px;
            margin-bottom: 25px; border: 1px solid #333; overflow: hidden;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .video-header { padding: 15px; display: flex; align-items: center; gap: 10px; }
        .user-img { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); }
        
        iframe { width: 100%; height: 450px; border: none; background: #000; }

        /* الأزرار 3D */
        .btn-3d {
            background: linear-gradient(145deg, var(--secondary), #0055aa);
            border: none; padding: 12px 25px; color: white; border-radius: 10px;
            cursor: pointer; font-weight: bold; box-shadow: 0 5px 0 #004488;
            transition: 0.1s; margin: 10px 0;
        }
        .btn-3d:active { transform: translateY(4px); box-shadow: 0 1px 0 #004488; }

        /* الزر العائم للدردشة */
        #chat-toggle {
            position: fixed; bottom: 30px; right: 30px;
            width: 65px; height: 65px; border-radius: 50%;
            background: var(--primary); color: #000; font-size: 30px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 0 20px var(--primary); z-index: 999;
        }

        #chat-window {
            position: fixed; bottom: 100px; right: 30px; width: 350px; height: 500px;
            background: var(--card-bg); border: 2px solid var(--primary);
            border-radius: 15px; display: none; flex-direction: column; z-index: 999;
        }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; }
        .msg { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; margin-bottom: 5px; position: relative; }
        .msg .author { font-size: 0.8em; color: var(--primary); font-weight: bold; }

        input {
            background: rgba(255,255,255,0.05); border: 1px solid #444;
            color: #fff; padding: 10px; border-radius: 8px; width: 90%; margin: 5px auto; display: block;
        }
    </style>
</head>
<body>

<div class="bg-animate"></div>

<div id="login-overlay">
    <div class="login-box">
        <h3>أهلاً بك يا بطل ⚛️</h3>
        <p>اكتب اسمك للدخول للمنصة</p>
        <input type="text" id="username-input" placeholder="اسمك الكريم...">
        <button class="btn-3d" onclick="login()">دخول</button>
    </div>
</div>

<div class="container">
    <h1 style="text-align:center; color:var(--primary)">لوحة التحكم العلمية 🚀</h1>
    
    <div class="video-card" style="padding:20px;">
        <input type="text" id="v-title" placeholder="عنوان المحاضرة...">
        <input type="text" id="v-link" placeholder="رابط يوتيوب هنا...">
        <button class="btn-3d" onclick="publishVideo()">نشر الآن</button>
    </div>

    <div id="feed"></div>
</div>

<div id="chat-toggle" onclick="toggleChat()">💬</div>
<div id="chat-window">
    <div style="padding:10px; background:var(--primary); color:#000; font-weight:bold; border-radius:12px 12px 0 0">مجموعة النقاش الطلابية 🎓</div>
    <div class="chat-messages" id="chat-msgs"></div>
    <input type="text" id="chat-input" placeholder="اكتب رسالة...">
    <input type="datetime-local" id="msg-timer" title="توقيت الرسالة">
    <button class="btn-3d" style="width:90%; margin:5px auto; display:block;" onclick="sendChatMessage()">إرسال</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLtjHJIMkLE3CE_WZSDpWQTx_cpTcpycM",
        authDomain: "studyproject-1466b.firebaseapp.com",
        projectId: "studyproject-1466b",
        storageBucket: "studyproject-1466b.firebasestorage.app",
        messagingSenderId: "589724771483",
        appId: "1:589724771483:web:1c53636da586d2c787923e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentUser = localStorage.getItem('scientific_user') || "";

    if(currentUser) document.getElementById('login-overlay').style.display = 'none';

    window.login = () => {
        const name = document.getElementById('username-input').value;
        if(name) {
            localStorage.setItem('scientific_user', name);
            location.reload();
        }
    };

    function getID(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length == 11) ? match[2] : null;
    }

    window.publishVideo = () => {
        const title = document.getElementById('v-title').value;
        const link = document.getElementById('v-link').value;
        const id = getID(link);
        if(title && id) {
            push(ref(db, 'posts'), { title, videoId: id, author: currentUser, time: Date.now() });
            document.getElementById('v-title').value = "";
            document.getElementById('v-link').value = "";
        }
    };

    onValue(ref(db, 'posts'), (snap) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snap.forEach((child) => {
            const post = child.val();
            const key = child.key;
            feed.innerHTML = `
                <div class="video-card">
                    <div class="video-header">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${post.author}" class="user-img">
                        <b>${post.author}</b>
                    </div>
                    <iframe src="https://www.youtube.com/embed/${post.videoId}?rel=0&modestbranding=1" allowfullscreen></iframe>
                    <div style="padding:15px">
                        <h3>${post.title}</h3>
                        <div id="comments-${key}"></div>
                        <input type="text" id="in-${key}" placeholder="تعليقك كـ ${currentUser}...">
                        <button class="btn-3d" onclick="addComm('${key}')">تعليق</button>
                    </div>
                </div>
            ` + feed.innerHTML;
            
            onValue(ref(db, `posts/${key}/comments`), (cSnap) => {
                const cBox = document.getElementById(`comments-${key}`);
                if(cBox) {
                    cBox.innerHTML = "";
                    cSnap.forEach(c => {
                        cBox.innerHTML += `<p><b>${c.val().user}:</b> ${c.val().text}</p>`;
                    });
                }
            });
        });
    });

    window.addComm = (key) => {
        const txt = document.getElementById(`in-${key}`).value;
        if(txt) {
            push(ref(db, `posts/${key}/comments`), { user: currentUser, text: txt });
            document.getElementById(`in-${key}`).value = "";
        }
    };

    // نظام الدردشة
    window.toggleChat = () => {
        const win = document.getElementById('chat-window');
        win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
    };

    window.sendChatMessage = () => {
        const text = document.getElementById('chat-input').value;
        const timer = document.getElementById('msg-timer').value;
        if(!text) return;

        const send = () => {
            push(ref(db, 'chat'), { user: currentUser, text, time: Date.now() });
        };

        if(timer) {
            const wait = new Date(timer).getTime() - Date.now();
            if(wait > 0) {
                setTimeout(send, wait);
                alert("تم توقيت الرسالة بنجاح!");
            }
        } else { send(); }
        document.getElementById('chat-input').value = "";
    };

    onValue(ref(db, 'chat'), (snap) => {
        const box = document.getElementById('chat-msgs');
        box.innerHTML = "";
        snap.forEach(m => {
            const isMe = m.val().user === currentUser;
            box.innerHTML += `
                <div class="msg">
                    <div class="author">${m.val().user}</div>
                    <div>${m.val().text}</div>
                    ${isMe ? `<button onclick="deleteMsg('${m.key}')" style="font-size:10px; background:none; border:none; color:red; cursor:pointer">حذف</button>` : ''}
                </div>
            `;
        });
        box.scrollTop = box.scrollHeight;
    });

    window.deleteMsg = (id) => remove(ref(db, `chat/${id}`));

</script>
</body>
</html>
