<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إنجازاتي المطور | Enjazati</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        :root {
            --primary: #00d2ff;
            --secondary: #9d50bb;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1e293b;
            --border: rgba(0,0,0,0.08);
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; transition: 0.3s ease; font-family: 'Tajawal', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

        /* شاشة الحماية */
        #gate-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* شريط السشنات العلوي المتطور (3D) */
        .top-session-bar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; padding: 10px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transform: perspective(1000px) rotateX(2deg);
            z-index: 2000; position: relative;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }
        .top-session-bar b { font-size: 16px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .top-session-bar span { font-size: 11px; display: block; opacity: 0.9; margin-top: 2px; }

        /* الحاوية الرئيسية */
        .app-shell { 
            display: flex; flex-direction: column; height: calc(100dvh - 60px); 
            max-width: 550px; margin: 0 auto; background: var(--card); 
            box-shadow: var(--shadow); position: relative;
        }

        header {
            padding: 10px 20px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* شريط القنوات */
        .channels-bar {
            display: flex; gap: 8px; padding: 10px 15px; overflow-x: auto;
            border-bottom: 1px solid var(--border); scrollbar-width: none;
        }
        .channels-bar::-webkit-scrollbar { display: none; }
        
        .chan-btn {
            padding: 6px 14px; border-radius: 18px; background: var(--bg);
            border: 1px solid var(--border); color: var(--text); cursor: pointer;
            display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500;
        }
        .chan-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* منطقة المحادثة */
        .chat-area { 
            flex: 1; overflow-y: auto; padding: 15px; 
            background: var(--bg); display: flex; flex-direction: column; gap: 10px;
        }

        /* الرسائل */
        .msg-wrapper { display: flex; gap: 8px; max-width: 88%; align-items: flex-end; }
        .msg-wrapper.me { align-self: flex-end; flex-direction: row-reverse; }
        
        .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--primary); }
        
        .bubble { 
            background: var(--card); padding: 10px 14px; border-radius: 15px; 
            border: 1px solid var(--border); position: relative; color: var(--text);
            font-size: 14px; line-height: 1.5; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .me .bubble { background: var(--primary); color: white; border: none; }

        .del-icon { font-size: 11px; color: #ff4b4b; margin: 0 5px; cursor: pointer; opacity: 0.6; }

        /* منطقة الإدخال */
        .input-bar { 
            padding: 12px 15px; display: flex; gap: 10px; align-items: center; 
            border-top: 1px solid var(--border); background: var(--card);
        }
        .input-bar input[type="text"] { 
            flex: 1; padding: 10px 15px; border-radius: 20px; 
            border: 1px solid var(--border); background: var(--bg); 
            color: var(--text); outline: none; font-size: 14px;
        }

        .icon-btn { font-size: 20px; color: var(--primary); cursor: pointer; }

        /* المودالات */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); 
            backdrop-filter: blur(4px); display: none; align-items: center; 
            justify-content: center; z-index: 5000; 
        }
        .modal-content { 
            background: var(--card); padding: 25px; border-radius: 20px; 
            width: 85%; text-align: center; box-shadow: var(--shadow);
        }
    </style>
</head>
<body data-theme="light">

<div class="top-session-bar" id="session-container">
    <b id="session-title">جاري الحساب...</b>
    <span id="session-countdown">المتبقي: --:--</span>
</div>

<div id="gate-overlay">
    <h2 style="color: var(--primary);">قفل الحماية</h2>
    <input type="password" id="gate-pass" placeholder="رمز الدخول" 
           style="padding:15px; border-radius:12px; border:2px solid var(--primary); text-align:center; font-size:18px; outline: none;">
</div>

<div class="app-shell">
    <header>
        <div onclick="toggleTheme()" style="cursor:pointer;"><i id="theme-icon" class="fas fa-moon"></i></div>
        <b style="font-size: 18px; color: var(--primary);">إنجازاتي المطور</b>
        <div class="icon-btn" onclick="openChannelModal()"><i class="fas fa-plus-circle"></i></div>
    </header>

    <div class="channels-bar" id="channels-container"></div>

    <main class="chat-area" id="chat-messages"></main>

    <div class="input-bar">
        <i class="fas fa-image icon-btn" onclick="document.getElementById('media-upload').click()"></i>
        <input type="file" id="media-upload" hidden accept="image/*,video/*">
        <input type="text" id="msg-text" placeholder="اكتب رسالتك...">
        <i class="fas fa-paper-plane icon-btn" id="send-trigger"></i>
    </div>
</div>

<div id="channel-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>إنشاء قناة جديدة</h3>
        <input type="text" id="new-chan-input" placeholder="اسم القناة" 
               style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; outline: none;">
        <button onclick="confirmCreateChannel()" style="width: 100%; padding: 12px; border-radius: 10px; background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer;">إنشاء</button>
        <button onclick="closeChannelModal()" style="margin-top: 10px; background: none; border: none; color: #888; cursor: pointer;">إلغاء</button>
    </div>
</div>

<div id="profile-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>مرحباً بك</h3>
        <p>أدخل اسمك المستعار للبدء</p>
        <input type="text" id="p-name-input" placeholder="اسمك" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); outline: none;">
        <button onclick="saveUserProfile()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; margin-top:15px; font-weight:bold; cursor:pointer;">حفظ</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLtjHJIMkLE3CE_WZSDpWQTx_cpTcpycM",
        authDomain: "studyproject-1466b.firebaseapp.com",
        projectId: "studyproject-1466b",
        storageBucket: "studyproject-1466b.firebasestorage.app",
        messagingSenderId: "589724771483",
        appId: "1:589724771483:web:1c53636da586d2c787923e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myUser = JSON.parse(localStorage.getItem('enjaz_user_v6'));
    const isVerified = localStorage.getItem('gate_verified_v6') === 'true';

    if (isVerified) {
        document.getElementById('gate-overlay').style.display = 'none';
        if (!myUser) document.getElementById('profile-modal').style.display = 'flex';
    }

    document.getElementById('gate-pass').oninput = (e) => {
        if (e.target.value === '166277399') {
            localStorage.setItem('gate_verified_v6', 'true');
            document.getElementById('gate-overlay').style.display = 'none';
            if (!myUser) document.getElementById('profile-modal').style.display = 'flex';
        }
    };

    window.saveUserProfile = () => {
        const name = document.getElementById('p-name-input').value;
        if (!name) return;
        myUser = { id: 'u' + Date.now(), name, img: 'https://cdn-icons-png.flaticon.com/512/149/149071.png' };
        localStorage.setItem('enjaz_user_v6', JSON.stringify(myUser));
        document.getElementById('profile-modal').style.display = 'none';
        location.reload();
    };

    // --- نظام السشنات 2 ساعة عمل / 15 دقيقة استراحة ---
    function updateSessions() {
        const now = new Date();
        const totalMinutes = now.getHours() * 60 + now.getMinutes();
        const cycle = 120 + 15; // 135 دقيقة لكل دورة كاملة
        
        const positionInCycle = totalMinutes % cycle;
        
        const titleEl = document.getElementById('session-title');
        const countdownEl = document.getElementById('session-countdown');
        const barEl = document.getElementById('session-container');

        if (positionInCycle < 120) {
            // سشن عمل
            const remaining = 120 - positionInCycle;
            titleEl.innerText = "⏳ سشن عمل وتركيز";
            countdownEl.innerText = `المتبقي على الاستراحة: ${Math.floor(remaining/60)}س ${remaining%60}د`;
            barEl.style.background = "linear-gradient(135deg, #00d2ff, #9d50bb)";
        } else {
            // استراحة
            const remaining = cycle - positionInCycle;
            titleEl.innerText = "☕ وقت الاستراحة المستحقة";
            countdownEl.innerText = `العودة للعمل بعد: ${remaining} دقيقة`;
            barEl.style.background = "linear-gradient(135deg, #11998e, #38ef7d)";
        }
    }
    setInterval(updateSessions, 1000);
    updateSessions();

    // --- إدارة القنوات (حذف علوم دينية وإبقاء دراستي) ---
    let activeChannelId = 'study_main';
    const defaultChans = {
        'study_main': { name: '📚 دراستي', fixed: true }
    };

    function syncChannels() {
        onValue(ref(db, 'channels_v6'), (snap) => {
            const container = document.getElementById('channels-container');
            container.innerHTML = "";
            const allChans = { ...defaultChans, ...snap.val() };
            Object.keys(allChans).forEach(id => {
                const c = allChans[id];
                const btn = document.createElement('div');
                btn.className = `chan-btn ${activeChannelId === id ? 'active' : ''}`;
                btn.innerHTML = `${c.name} ${!c.fixed ? `<i class="fas fa-trash" onclick="removeChannel('${id}')" style="margin-right:8px; font-size:10px;"></i>` : ''}`;
                btn.onclick = (e) => { if (!e.target.classList.contains('fa-trash')) { activeChannelId = id; syncChannels(); syncMessages(); } };
                container.appendChild(btn);
            });
        });
    }

    window.openChannelModal = () => document.getElementById('channel-modal').style.display = 'flex';
    window.closeChannelModal = () => document.getElementById('channel-modal').style.display = 'none';

    window.confirmCreateChannel = () => {
        const name = document.getElementById('new-chan-input').value;
        if (!name) return;
        const newId = 'ch_' + Date.now();
        set(ref(db, 'channels_v6/' + newId), { name: '# ' + name, fixed: false });
        closeChannelModal();
    };

    window.removeChannel = (id) => { if (confirm("حذف القناة؟")) remove(ref(db, 'channels_v6/' + id)); };

    // --- الرسائل ---
    function syncMessages() {
        onValue(ref(db, 'msgs_v6/' + activeChannelId), (snap) => {
            const area = document.getElementById('chat-messages');
            area.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const isMe = myUser && m.uid === myUser.id;
                area.innerHTML += `
                    <div class="msg-wrapper ${isMe ? 'me' : ''}">
                        <div class="bubble">
                            <div style="font-size:10px; font-weight:bold; opacity:0.7;">${m.u}</div>
                            ${m.type === 'text' ? m.txt : `<img src="${m.media}" style="width:100%; border-radius:10px;">`}
                            ${isMe ? `<i class="fas fa-trash del-icon" onclick="deleteMsg('${child.key}')"></i>` : ''}
                        </div>
                    </div>
                `;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    window.deleteMsg = (id) => { if (confirm("حذف الرسالة؟")) remove(ref(db, `msgs_v6/${activeChannelId}/${id}`)); };

    document.getElementById('send-trigger').onclick = () => {
        const txt = document.getElementById('msg-text').value;
        if (!txt) return;
        push(ref(db, 'msgs_v6/' + activeChannelId), { uid: myUser.id, u: myUser.name, txt, type: 'text' });
        document.getElementById('msg-text').value = "";
    };

    window.toggleTheme = () => {
        const b = document.body;
        const icon = document.getElementById('theme-icon');
        const current = b.getAttribute('data-theme');
        b.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
        icon.className = current === 'light' ? 'fas fa-sun' : 'fas fa-moon';
    };

    syncChannels();
    syncMessages();
</script>
</body>
</html>
