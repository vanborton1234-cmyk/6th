<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beta | المنصة الشاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap');

        :root {
            --bg-body: #e0e5ec;
            --bg-card: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        [data-theme="dark"] {
            --bg-body: #1a1e29;
            --bg-card: #272c39;
            --text-main: #f5f6fa;
            --text-muted: #a4b0be;
            --shadow-light: #2c3241;
            --shadow-dark: #12151d;
            --glass-bg: rgba(39, 44, 57, 0.8);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; }
        
        body, html { 
            background: var(--bg-body); 
            color: var(--text-main); 
            height: 100dvh; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
        }

        /* حاوية التطبيق */
        .app-shell {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--bg-body);
            position: relative;
        }

        /* الهيدر */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #00c6ff, #0072ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .theme-btn { background: none; border: none; font-size: 20px; color: var(--text-main); cursor: pointer; }

        /* شريط السشنات (3D Style) */
        .session-panel {
            margin: 15px;
            padding: 15px;
            border-radius: 20px;
            background: var(--bg-card);
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }
        .session-panel::before {
            content: ''; position: absolute; top: 0; right: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, #ff9a9e, #fecfef, #a1c4fd);
        }
        .session-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 15px; }
        .iraq-clock { background: var(--bg-body); padding: 5px 12px; border-radius: 12px; font-size: 13px; box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); color: var(--text-main);}
        .session-stats { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; color: var(--text-muted); }
        .session-controls { display: flex; gap: 10px; }
        
        .btn-3d {
            flex: 1; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer;
            box-shadow: 4px 4px 8px rgba(0,0,0,0.15), inset 2px 2px 4px rgba(255,255,255,0.4);
            font-size: 14px; text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .btn-start { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
        .btn-start:active { box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2); transform: translateY(2px); }
        .btn-cancel { background: linear-gradient(135deg, #ff416c, #ff4b2b); color: white; }
        .btn-cancel:active { box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2); transform: translateY(2px); }

        /* منطقة التصفح (الكروت) */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 5px 15px 25px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }
        .content-scroll::-webkit-scrollbar { width: 0px; } /* إخفاء شريط التمرير لجمالية أكثر */

        /* تصميم الكارت الثلاثي الأبعاد */
        .category-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3), inset 0 2px 5px rgba(255,255,255,0.4);
            transform-style: preserve-3d;
            position: relative;
            overflow: hidden;
        }
        .category-card:active { transform: scale(0.97) translateY(2px); box-shadow: 0 5px 10px rgba(0,0,0,0.2); }
        
        .card-icon {
            font-size: 28px;
            background: rgba(255,255,255,0.2);
            width: 50px; height: 50px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 15px;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.3);
        }

        .card-title { flex: 1; margin-right: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        /* زر الإضافة العائم */
        .fab-add {
            position: absolute;
            bottom: 25px; left: 25px;
            width: 60px; height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; font-size: 24px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.4);
            cursor: pointer; border: none; z-index: 1000;
        }
        .fab-add:active { transform: scale(0.9); }

        /* النافذة المنبثقة (المودال) */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 5000;
        }
        .modal-content {
            background: var(--bg-card); padding: 25px; border-radius: 25px; width: 85%; max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .styled-input { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--bg-body); color: var(--text-main); margin-bottom: 15px; outline: none; box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); font-size: 15px; }
        .styled-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #00c6ff, #0072ff); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 10px rgba(0, 114, 255, 0.3); }

        /* سلة المهملات للأزرار المخصصة */
        .del-btn { background: rgba(0,0,0,0.3); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body data-theme="light">

<div class="app-shell">
    
    <header>
        <div class="logo">Beta</div>
        <button class="theme-btn" onclick="toggleTheme()"><i id="theme-icon" class="fas fa-moon"></i></button>
    </header>

    <div class="session-panel" id="session-panel">
        <div class="session-header">
            <span id="s-title">⏱️ بومودورو الإنجاز</span>
            <span class="iraq-clock" id="iraq-clock">--:--</span>
        </div>
        <div class="session-stats">
            <span id="s-start">البداية: --:--</span>
            <span id="s-status" style="color:#0072ff;">جاهز للبدء</span>
            <span id="s-rem">المتبقي: --:--</span>
        </div>
        <div class="session-controls">
            <button class="btn-3d btn-start" onclick="startSession()">▶ بدء (50د)</button>
            <button class="btn-3d btn-cancel" onclick="cancelSession()">✖ إلغاء</button>
        </div>
    </div>

    <div class="content-scroll" id="links-container">
        </div>

    <button class="fab-add" onclick="document.getElementById('link-modal').style.display='flex'">
        <i class="fas fa-plus"></i>
    </button>
</div>

<div id="link-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-bottom: 20px; color: var(--text-main);">إضافة قسم جديد</h3>
        <input type="text" id="new-link-name" placeholder="اسم القسم (مثال: البرمجة)" class="styled-input">
        <input type="url" id="new-link-url" placeholder="رابط التليجرام" class="styled-input">
        
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding: 0 10px;">
            <label style="font-weight: bold; color: var(--text-muted);">لون القسم:</label>
            <input type="color" id="new-link-color1" value="#ff9a9e" style="border:none; width:45px; height:45px; border-radius:10px; cursor:pointer;">
            <input type="color" id="new-link-color2" value="#fecfef" style="border:none; width:45px; height:45px; border-radius:10px; cursor:pointer;">
        </div>

        <button class="styled-btn" onclick="addCustomLink()">حفظ وإضافة</button>
        <button onclick="document.getElementById('link-modal').style.display='none'" style="width: 100%; padding: 12px; margin-top:10px; background:none; border:none; color:var(--text-muted); cursor:pointer; font-weight: bold;">إلغاء</button>
    </div>
</div>

<script>
    // --- 1. الثيم (الوضع الليلي والنهاري) ---
    function toggleTheme() {
        const b = document.body;
        const current = b.getAttribute('data-theme');
        b.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
        document.getElementById('theme-icon').className = current === 'light' ? 'fas fa-sun' : 'fas fa-moon';
    }

    // --- 2. نظام السشنات وساعة العراق ---
    function updateClock() {
        const timeOptions = { timeZone: 'Asia/Baghdad', hour: '2-digit', minute: '2-digit', hour12: true };
        document.getElementById('iraq-clock').innerText = new Intl.DateTimeFormat('ar-IQ', timeOptions).format(new Date());
    }
    setInterval(updateClock, 1000); updateClock();

    function formatTimeObject(dateObj) {
        let hours = dateObj.getHours(); let minutes = dateObj.getMinutes();
        const ampm = hours >= 12 ? 'م' : 'ص';
        hours = hours % 12; hours = hours ? hours : 12; 
        minutes = minutes < 10 ? '0' + minutes : minutes;
        return `${hours}:${minutes} ${ampm}`;
    }

    let sessionTimer;
    window.startSession = () => {
        const now = Date.now();
        const sessionData = { startTime: now, endTime: now + (50 * 60 * 1000), type: 'study' };
        localStorage.setItem('beta_session', JSON.stringify(sessionData));
        runSessionLogic();
    };

    window.cancelSession = () => {
        if(confirm("متأكد تريد إلغاء السشن؟")) {
            localStorage.removeItem('beta_session');
            document.getElementById('s-status').innerText = "جاهز للبدء";
            document.getElementById('s-start').innerText = "البداية: --:--";
            document.getElementById('s-rem').innerText = "المتبقي: --:--";
            document.getElementById('s-title').innerText = "⏱️ بومودورو الإنجاز";
        }
    };

    function runSessionLogic() {
        clearInterval(sessionTimer);
        sessionTimer = setInterval(() => {
            const dataStr = localStorage.getItem('beta_session');
            if(!dataStr) return;
            
            let data = JSON.parse(dataStr);
            const now = Date.now();
            const diff = data.endTime - now;

            document.getElementById('s-start').innerText = `البداية: ${formatTimeObject(new Date(data.startTime))}`;

            if(diff <= 0) {
                if(data.type === 'study') {
                    alert("بطل! كملت 50 دقيقة دراسة، خذلك استراحة 10 دقايق.");
                    data = { startTime: now, endTime: now + (10 * 60 * 1000), type: 'break' };
                    localStorage.setItem('beta_session', JSON.stringify(data));
                } else {
                    alert("انتهت الاستراحة، اضغط بدء للعودة.");
                    localStorage.removeItem('beta_session');
                    return cancelSession();
                }
            }

            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('s-rem').innerText = `المتبقي: ${m}:${s < 10 ? '0':''}${s}`;

            if(data.type === 'study') {
                document.getElementById('s-status').innerText = "📝 وقت الدراسة";
                document.getElementById('s-title').innerText = "🔥 سشن فعال";
            } else {
                document.getElementById('s-status').innerText = "☕ استراحة";
                document.getElementById('s-title').innerText = "💆‍♂️ وقت الراحة";
            }
        }, 1000);
    }
    runSessionLogic();

    // --- 3. بيانات الأقسام الأساسية وتوليدها ---
    const baseCategories = [
        { title: "الصفحة الرئيسية", url: "https://t.me/Beta_s5/1", icon: "fa-home", c1: "#4facfe", c2: "#00f2fe" },
        { title: "المكتبة الاسلامية", url: "https://t.me/Beta_s5/38", icon: "fa-book-quran", c1: "#11998e", c2: "#38ef7d" },
        { title: "النهضة الشيعية", url: "https://t.me/Beta_s5/396", icon: "fa-scale-balanced", c1: "#6a11cb", c2: "#2575fc" },
        { title: "قسم العلوم", url: "https://t.me/Beta_s5/13", icon: "fa-flask", c1: "#ff0844", c2: "#ffb199" },
        { title: "قسم الاحياء", url: "https://t.me/Beta_s5/16", icon: "fa-dna", c1: "#0ba360", c2: "#3cba92" },
        { title: "قسم الكيمياء", url: "https://t.me/Beta_s5/15", icon: "fa-vial", c1: "#f83600", c2: "#f9d423" },
        { title: "قسم علم الارض", url: "https://t.me/Beta_s5/18", icon: "fa-earth-americas", c1: "#b224ef", c2: "#7579ff" },
        { title: "قسم الفلك", url: "https://t.me/Beta_s5/17", icon: "fa-meteor", c1: "#141e30", c2: "#243b55" },
        { title: "الثقافة العلمية", url: "https://t.me/Beta_s5/5", icon: "fa-brain", c1: "#ff758c", c2: "#ff7eb3" },
        { title: "قسم السفر", url: "https://t.me/Beta_s5/9", icon: "fa-plane-departure", c1: "#2193b0", c2: "#6dd5ed" },
        { title: "الحياة المائية", url: "https://t.me/Beta_s5/14", icon: "fa-water", c1: "#00c6ff", c2: "#0072ff" },
        { title: "قسم الفيزياء", url: "https://t.me/Beta_s5/19", icon: "fa-atom", c1: "#fc4a1a", c2: "#f7b733" },
        { title: "قسم الأدوية", url: "https://t.me/Beta_s5/21", icon: "fa-pills", c1: "#ee0979", c2: "#ff6a00" },
        { title: "قسم الطب", url: "https://t.me/Beta_s5/20", icon: "fa-stethoscope", c1: "#00b09b", c2: "#96c93d" },
        { title: "العلوم الشيعية والفقه", url: "https://t.me/Beta_s5/22", icon: "fa-book-open", c1: "#8e2de2", c2: "#4a00e0" },
        { title: "تاريخ الإسلام", url: "https://t.me/Beta_s5/24", icon: "fa-landmark-dome", c1: "#a8c0ff", c2: "#3f2b96" },
        { title: "تاريخ العراق", url: "https://t.me/Beta_s5/39", icon: "fa-monument", c1: "#d38312", c2: "#a83279" },
        { title: "نهضة العراق", url: "https://t.me/Beta_s5/40", icon: "fa-arrow-trend-up", c1: "#1d976c", c2: "#93f9b9" },
        { title: "الفلسفة الإسلامية", url: "https://t.me/Beta_s5/29", icon: "fa-lightbulb", c1: "#5c258d", c2: "#4389a2" },
        { title: "كتب اسلامية علمية", url: "https://t.me/Beta_s5/25", icon: "fa-book", c1: "#eb3349", c2: "#f45c43" },
        { title: "بحوث اسلامية", url: "https://t.me/Beta_s5/27", icon: "fa-scroll", c1: "#4b6cb7", c2: "#182848" },
        { title: "الاقتصاد الإسلامي", url: "https://t.me/Beta_s5/28", icon: "fa-coins", c1: "#f12711", c2: "#f5af19" }
    ];

    function renderLinks() {
        const container = document.getElementById('links-container');
        container.innerHTML = ''; // تفريغ الحاوية

        // 1. رسم الأقسام الأساسية
        baseCategories.forEach(cat => {
            container.innerHTML += `
                <a href="${cat.url}" target="_blank" class="category-card" style="background: linear-gradient(135deg, ${cat.c1}, ${cat.c2});">
                    <div class="card-icon"><i class="fas ${cat.icon}"></i></div>
                    <div class="card-title">${cat.title}</div>
                    <i class="fas fa-chevron-left" style="opacity: 0.7;"></i>
                </a>
            `;
        });

        // 2. رسم الأقسام المضافة من قبل المستخدم
        const customLinks = JSON.parse(localStorage.getItem('beta_custom_links')) || [];
        customLinks.forEach((link, index) => {
            container.innerHTML += `
                <a href="${link.url}" target="_blank" class="category-card" style="background: linear-gradient(135deg, ${link.c1}, ${link.c2});">
                    <div class="card-icon"><i class="fas fa-link"></i></div>
                    <div class="card-title">${link.name}</div>
                    <button class="del-btn" onclick="event.preventDefault(); deleteCustomLink(${index})">
                        <i class="fas fa-trash" style="font-size: 12px;"></i>
                    </button>
                </a>
            `;
        });
    }

    window.addCustomLink = () => {
        const name = document.getElementById('new-link-name').value;
        const url = document.getElementById('new-link-url').value;
        const c1 = document.getElementById('new-link-color1').value;
        const c2 = document.getElementById('new-link-color2').value;
        
        if(!name || !url) return alert("يرجى كتابة الاسم والرابط");

        const links = JSON.parse(localStorage.getItem('beta_custom_links')) || [];
        links.push({name, url, c1, c2});
        localStorage.setItem('beta_custom_links', JSON.stringify(links));
        
        document.getElementById('link-modal').style.display = 'none';
        document.getElementById('new-link-name').value = '';
        document.getElementById('new-link-url').value = '';
        renderLinks(); // تحديث القائمة
    };

    window.deleteCustomLink = (index) => {
        if(confirm("هل تريد حذف هذا القسم المخصص؟")) {
            const links = JSON.parse(localStorage.getItem('beta_custom_links')) || [];
            links.splice(index, 1);
            localStorage.setItem('beta_custom_links', JSON.stringify(links));
            renderLinks();
        }
    };

    // تشغيل رسم الروابط عند فتح الموقع
    renderLinks();
</script>
</body>
</html>
