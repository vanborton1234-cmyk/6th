<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنجازات | الرادار الدراسي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        :root {
            --primary: #00f2ff; --accent: #7000ff; --bg: #05060a; --card: rgba(20, 25, 30, 0.95);
        }

        body {
            font-family: 'Tajawal', sans-serif; margin: 0; background: var(--bg);
            color: #fff; display: flex; height: 100vh; overflow: hidden;
        }

        #atom-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* الشريط الجانبي الثابت */
        .sidebar {
            width: 250px; background: var(--card); border-left: 1px solid var(--primary);
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;
            backdrop-filter: blur(10px); z-index: 1001;
        }

        .status-box {
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--primary);
            padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center;
        }

        /* حاوية الشات الرئيسية */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* رسالة السشن المثبتة */
        .sticky-announcement {
            position: sticky; top: 0; background: rgba(112, 0, 255, 0.8);
            padding: 10px; text-align: center; font-weight: bold; z-index: 1000;
            border-bottom: 1px solid var(--primary); backdrop-filter: blur(5px);
            display: none;
        }

        .messages-area {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }

        /* فقاعات الرسائل */
        .msg { max-width: 80%; align-self: flex-start; position: relative; }
        .msg.me { align-self: flex-end; }
        
        .msg-bubble { 
            padding: 12px; border-radius: 15px; background: #1e1f24; border: 1px solid #333;
            position: relative;
        }
        .me .msg-bubble { background: var(--accent); border: none; }
        
        .delete-icon {
            position: absolute; top: -10px; left: -10px; background: #ff4d4d;
            width: 20px; height: 20px; border-radius: 50%; font-size: 10px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .user-tag { font-size: 11px; margin-bottom: 5px; color: var(--primary); display: flex; align-items: center; gap: 5px; }

        .input-bar {
            padding: 20px; background: var(--card); display: flex; gap: 10px; align-items: center;
        }
        .input-bar input {
            flex: 1; background: #000; border: 1px solid #444; padding: 12px 20px;
            border-radius: 30px; color: #fff; outline: none;
        }

        /* شاشة الدخول (تظهر فقط عند الحاجة) */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 5000;
            display: none; align-items: center; justify-content: center;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-left: none; border-bottom: 1px solid var(--primary); padding: 10px; }
            .sidebar .status-box { margin-bottom: 5px; }
        }
    </style>
</head>
<body>

<canvas id="atom-canvas"></canvas>

<div id="login-screen">
    <div style="background:var(--card); padding:30px; border-radius:20px; text-align:center; width:350px; border:1px solid var(--primary);">
        <h2 style="color:var(--primary)">إنجازاتي ⚛️</h2>
        <p>سجل بياناتك لمرة واحدة فقط</p>
        <img id="p-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--primary); cursor:pointer;" onclick="document.getElementById('f-img').click()">
        <input type="file" id="f-img" hidden onchange="preview(this)">
        <input type="text" id="u-name" placeholder="اسمك الكامل" style="width:100%; padding:12px; margin:20px 0; border-radius:10px; border:1px solid #444; background:#000; color:white;">
        <button onclick="save()" style="width:100%; padding:12px; background:var(--primary); border:none; border-radius:10px; font-weight:bold; color:#000;">دخول</button>
    </div>
</div>

<div class="sidebar">
    <h3 style="color:var(--primary); margin-top:0;">الجدول الزمني</h3>
    <div class="status-box">
        <small>السشن الحالي</small>
        <div id="curr-sess-name" style="font-weight:bold; font-size:18px;">--</div>
        <div id="curr-sess-time" style="color:var(--primary); font-size:14px;">00:00:00</div>
    </div>
    <div class="status-box" style="border-color:#777; opacity:0.8;">
        <small>السشن القادم</small>
        <div id="next-sess-name" style="font-size:14px;">--</div>
        <div id="next-sess-countdown" style="font-size:14px;">--</div>
    </div>
    <div style="margin-top:auto; text-align:center;">
        <img id="my-avatar" style="width:50px; height:50px; border-radius:50%; border:2px solid var(--primary);">
        <p id="my-name" style="margin:5px 0; font-weight:bold;"></p>
        <button onclick="logout()" style="background:none; border:none; color:#ff4d4d; font-size:12px; cursor:pointer;">تغيير الحساب</button>
    </div>
</div>

<div class="main-content">
    <div id="sticky-header" class="sticky-announcement">🚀 السشن الحالي بدأ.. بالتوفيق للجميع!</div>
    <div class="messages-area" id="chat-box"></div>
    
    <div class="input-bar">
        <i class="fas fa-image" style="cursor:pointer; font-size:22px; color:var(--primary);" onclick="document.getElementById('m-file').click()"></i>
        <input type="file" id="m-file" hidden accept="image/*,video/*" onchange="upload(this)">
        <input type="text" id="m-input" placeholder="اكتب رسالتك أو شارك إنجازك...">
        <button onclick="send()" style="background:var(--primary); border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLtjHJIMkLE3CE_WZSDpWQTx_cpTcpycM",
        authDomain: "studyproject-1466b.firebaseapp.com",
        projectId: "studyproject-1466b",
        storageBucket: "studyproject-1466b.firebasestorage.app",
        messagingSenderId: "589724771483",
        appId: "1:589724771483:web:1c53636da586d2c787923e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- نظام الذرات ---
    const canvas = document.getElementById('atom-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = [];
    class P { constructor() { this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.vx=(Math.random()-0.5); this.vy=(Math.random()-0.5); } update() { this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>canvas.width)this.vx*=-1; if(this.y<0||this.y>canvas.height)this.vy*=-1; ctx.fillStyle="#00f2ff"; ctx.beginPath(); ctx.arc(this.x,this.y,1,0,Math.PI*2); ctx.fill(); } }
    for(let i=0;i<50;i++) particles.push(new P());
    function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>p.update()); requestAnimationFrame(anim); }
    anim();

    // --- إدارة المستخدم ---
    let user = JSON.parse(localStorage.getItem('enjaz_final_v1'));
    if(!user) document.getElementById('login-screen').style.display='flex';
    else loadApp();

    window.preview = (i) => { const r=new FileReader(); r.onload=(e)=>document.getElementById('p-img').src=e.target.result; r.readAsDataURL(i.files[0]); };
    window.save = () => {
        const n=document.getElementById('u-name').value;
        const p=document.getElementById('p-img').src;
        if(!n) return;
        user = { n, p, id: Date.now() };
        localStorage.setItem('enjaz_final_v1', JSON.stringify(user));
        location.reload();
    };
    window.logout = () => { localStorage.removeItem('enjaz_final_v1'); location.reload(); };

    function loadApp() {
        document.getElementById('my-avatar').src = user.p;
        document.getElementById('my-name').innerText = user.n;
        checkSchedule();
        setInterval(checkSchedule, 1000);
    }

    // --- الجدول الزمني (نظام 12 ساعة) ---
    const schedule = [
        { n: "السشن الأول", h1: 6, m1: 0, h2: 8, m2: 0 },
        { n: "استراحة ☕", h1: 8, m1: 0, h2: 8, m2: 15 },
        { n: "السشن الثاني", h1: 8, m1: 15, h2: 10, m2: 15 },
        { n: "استراحة ☕", h1: 10, m1: 15, h2: 10, m2: 30 },
        { n: "السشن الثالث", h1: 10, m1: 30, h2: 12, m2: 0 },
        { n: "السشن الثالث (ب)", h1: 13, m1: 0, h2: 15, m2: 0 },
        { n: "استراحة ☕", h1: 15, m1: 0, h2: 15, m2: 15 },
        { n: "السشن الرابع", h1: 15, m1: 15, h2: 17, m2: 15 },
        { n: "استراحة ☕", h1: 17, m1: 15, h2: 17, m2: 30 },
        { n: "السشن الخامس", h1: 17, m1: 30, h2: 18, m2: 30 },
        { n: "السشن السادس", h1: 20, m1: 0, h2: 22, m2: 0 }
    ];

    function format12(h, m) {
        let ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
    }

    function checkSchedule() {
        const now = new Date();
        const curMin = now.getHours() * 60 + now.getMinutes();
        let active = null;
        let next = null;

        schedule.forEach((s, index) => {
            const sMin = s.h1 * 60 + s.m1;
            const eMin = s.h2 * 60 + s.m2;
            if(curMin >= sMin && curMin < eMin) active = s;
            else if(sMin > curMin && !next) next = s;
        });

        const stick = document.getElementById('sticky-header');
        if(active) {
            document.getElementById('curr-sess-name').innerText = active.n;
            document.getElementById('curr-sess-time').innerText = `من ${format12(active.h1, active.m1)} إلى ${format12(active.h2, active.m2)}`;
            stick.style.display = 'block';
            stick.innerText = `📢 الآن: ${active.n} (ينتهي ${format12(active.h2, active.m2)})`;
        } else {
            document.getElementById('curr-sess-name').innerText = "خارج وقت العمل";
            document.getElementById('curr-sess-time').innerText = "--:--";
            stick.style.display = 'none';
        }

        if(next) {
            document.getElementById('next-sess-name').innerText = next.n;
            document.getElementById('next-sess-countdown').innerText = `يبدأ ${format12(next.h1, next.m1)}`;
        }

        // الحذف التلقائي اليومي
        const d = now.toLocaleDateString();
        if(localStorage.getItem('last_del') !== d) { remove(ref(db, 'chats')); localStorage.setItem('last_del', d); }
    }

    // --- نظام المراسلة ---
    window.send = () => {
        const val = document.getElementById('m-input').value;
        if(!val) return;
        push(ref(db, 'chats'), { u: user.n, p: user.p, uid: user.id, txt: val, type: 'text', time: serverTimestamp() });
        document.getElementById('m-input').value = "";
    };

    window.upload = (i) => {
        const r=new FileReader();
        const type = i.files[0].type.startsWith('image') ? 'img' : 'vid';
        r.onload=(e)=> push(ref(db, 'chats'), { u: user.n, p: user.p, uid: user.id, media: e.target.result, type, time: serverTimestamp() });
        r.readAsDataURL(i.files[0]);
    };

    window.del = (k) => { if(confirm("حذف الرسالة؟")) remove(ref(db, `chats/${k}`)); };

    onValue(ref(db, 'chats'), (snap) => {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        snap.forEach(c => {
            const d = c.val();
            const isMe = d.uid === user.id;
            let timeStr = d.time ? format12(new Date(d.time).getHours(), new Date(d.time).getMinutes()) : '';
            
            let content = d.type === 'text' ? d.txt : 
                         (d.type === 'img' ? `<img src="${d.media}" style="width:100%; border-radius:10px;">` : `<video src="${d.media}" controls style="width:100%; border-radius:10px;"></video>`);

            box.innerHTML += `
                <div class="msg ${isMe ? 'me' : ''}">
                    <div class="user-tag"><img src="${d.p}" style="width:18px; height:18px; border-radius:50%;"> ${d.u} <small style="color:#666">${timeStr}</small></div>
                    <div class="msg-bubble">
                        <i class="fas fa-times delete-icon" onclick="del('${c.key}')"></i>
                        ${content}
                    </div>
                </div>
            `;
        });
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
