<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AM ros v5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        :root {
            --primary: #00d2ff;
            --secondary: #9d50bb;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1e293b;
            --border: rgba(0,0,0,0.08);
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; transition: 0.3s ease; font-family: 'Tajawal', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

        /* شريط السشنات العلوي (3D) */
        .top-session-bar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; padding: 10px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transform: perspective(1000px) rotateX(2deg);
            z-index: 2000; position: relative;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }
        .top-session-bar b { font-size: 16px; }
        .top-session-bar span { font-size: 11px; display: block; opacity: 0.9; }

        /* شاشة الحماية */
        #gate-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .app-shell { 
            display: flex; flex-direction: column; height: calc(100dvh - 65px); 
            max-width: 550px; margin: 0 auto; background: var(--card); box-shadow: var(--shadow);
        }

        header { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        .channels-bar { display: flex; gap: 8px; padding: 10px 15px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .chan-btn { padding: 6px 14px; border-radius: 18px; background: var(--bg); border: 1px solid var(--border); color: var(--text); cursor: pointer; white-space: nowrap; font-size: 13px; }
        .chan-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .chat-area { flex: 1; overflow-y: auto; padding: 15px; background: var(--bg); display: flex; flex-direction: column; gap: 15px; }

        /* الرسائل مع الأفاتار */
        .msg-wrapper { display: flex; gap: 10px; max-width: 90%; align-items: flex-end; }
        .msg-wrapper.me { align-self: flex-end; flex-direction: row-reverse; }
        
        .u-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); flex-shrink: 0; }
        
        .bubble { 
            background: var(--card); padding: 10px 15px; border-radius: 18px; 
            border: 1px solid var(--border); position: relative; color: var(--text);
            font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .me .bubble { background: var(--primary); color: white; border: none; border-bottom-right-radius: 4px; }
        .other .bubble { border-bottom-left-radius: 4px; }

        .u-name { font-size: 10px; font-weight: bold; margin-bottom: 3px; display: block; opacity: 0.8; }
        .del-msg { font-size: 10px; color: #ff4b4b; margin: 5px 5px 0; cursor: pointer; display: inline-block; opacity: 0.7; }

        .input-bar { padding: 12px 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid var(--border); }
        .input-bar input[type="text"] { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }

        .icon-btn { font-size: 20px; color: var(--primary); cursor: pointer; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 5000; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 85%; text-align: center; }
    </style>
</head>
<body data-theme="light">

<div class="top-session-bar" id="session-bar">
    <b id="session-text">فحص الدورة الزمنية...</b>
    <span id="session-time">--:--</span>
</div>

<div id="gate-overlay">
    <h2 style="color: var(--primary);">رمز الدخول</h2>
    <input type="password" id="gate-pass" placeholder="••••••••" style="padding:15px; border-radius:12px; border:2px solid var(--primary); text-align:center; font-size:20px; width:200px; outline:none;">
</div>

<div class="app-shell">
    <header>
        <div onclick="toggleTheme()" style="cursor:pointer;"><i id="theme-icon" class="fas fa-moon"></i></div>
        <b style="color: var(--primary);">إنجازاتي</b>
        <i class="fas fa-plus-circle icon-btn" onclick="openChanModal()"></i>
    </header>

    <div class="channels-bar" id="chan-list"></div>

    <main class="chat-area" id="chat-flow"></main>

    <div class="input-bar">
        <i class="fas fa-camera icon-btn" onclick="document.getElementById('file-input').click()"></i>
        <input type="file" id="file-input" hidden accept="image/*,video/*">
        <input type="text" id="msg-input" placeholder="اكتب شيئاً...">
        <i class="fas fa-paper-plane icon-btn" id="send-btn"></i>
    </div>
</div>

<div id="profile-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>أهلاً بك!</h3>
        <p>اختر صورتك واسمك للبدء</p>
        <img id="p-img-prev" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--primary); object-fit:cover; cursor:pointer;">
        <input type="file" id="p-img-file" hidden accept="image/*">
        <input type="text" id="p-name-in" placeholder="اسمك المستعار" style="width:100%; padding:12px; margin:15px 0; border-radius:10px; border:1px solid var(--border); outline:none;">
        <button onclick="finishProfile()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold;">دخول</button>
    </div>
</div>

<div id="chan-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>قناة جديدة</h3>
        <input type="text" id="new-chan-name" placeholder="اسم القناة" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); margin-bottom:15px; outline:none;">
        <button onclick="addChannel()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold;">إنشاء</button>
        <button onclick="closeChanModal()" style="margin-top:10px; background:none; border:none; color:#888;">إلغاء</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLtjHJIMkLE3CE_WZSDpWQTx_cpTcpycM",
        authDomain: "studyproject-1466b.firebaseapp.com",
        projectId: "studyproject-1466b",
        storageBucket: "studyproject-1466b.firebasestorage.app",
        messagingSenderId: "589724771483",
        appId: "1:589724771483:web:1c53636da586d2c787923e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myUser = JSON.parse(localStorage.getItem('enjaz_user_final'));
    const isVerified = localStorage.getItem('gate_ok') === 'true';

    if(isVerified) {
        document.getElementById('gate-overlay').style.display = 'none';
        if(!myUser) document.getElementById('profile-modal').style.display = 'flex';
    }

    document.getElementById('gate-pass').oninput = (e) => {
        if(e.target.value === '166277399') {
            localStorage.setItem('gate_ok', 'true');
            document.getElementById('gate-overlay').style.display = 'none';
            if(!myUser) document.getElementById('profile-modal').style.display = 'flex';
        }
    };

    // إعداد الملف الشخصي
    document.getElementById('p-img-prev').onclick = () => document.getElementById('p-img-file').click();
    document.getElementById('p-img-file').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => document.getElementById('p-img-prev').src = ev.target.result;
        r.readAsDataURL(e.target.files[0]);
    };

    window.finishProfile = () => {
        const name = document.getElementById('p-name-in').value;
        const img = document.getElementById('p-img-prev').src;
        if(!name) return;
        myUser = { id: 'u'+Date.now(), name, img };
        localStorage.setItem('enjaz_user_final', JSON.stringify(myUser));
        location.reload();
    };

    // نظام السشنات (2 ساعة عمل / 15 دقيقة استراحة)
    function runSessions() {
        const now = new Date();
        const mins = now.getHours() * 60 + now.getMinutes();
        const cycle = 135; 
        const pos = mins % cycle;
        if(pos < 120) {
            const rem = 120 - pos;
            document.getElementById('session-text').innerText = "⏳ سشن التركيز والإنجاز";
            document.getElementById('session-time').innerText = `المتبقي: ${Math.floor(rem/60)}س ${rem%60}د`;
            document.getElementById('session-bar').style.background = "linear-gradient(135deg, #00d2ff, #9d50bb)";
        } else {
            const rem = cycle - pos;
            document.getElementById('session-text').innerText = "☕ وقت استراحة محارب";
            document.getElementById('session-time').innerText = `العودة للعمل بعد: ${rem} دقيقة`;
            document.getElementById('session-bar').style.background = "linear-gradient(135deg, #11998e, #38ef7d)";
        }
    }
    setInterval(runSessions, 1000); runSessions();

    // القنوات والرسائل
    let activeId = 'study_main';
    function loadChans() {
        onValue(ref(db, 'chans_final'), (snap) => {
            const list = document.getElementById('chan-list');
            list.innerHTML = `<div class="chan-btn ${activeId==='study_main'?'active':''}" onclick="setChan('study_main')">📚 دراستي</div>`;
            snap.forEach(c => {
                const data = c.val();
                list.innerHTML += `<div class="chan-btn ${activeId===c.key?'active':''}" onclick="setChan('${c.key}')"># ${data.name} <i class="fas fa-trash" style="font-size:9px; margin-right:5px;" onclick="delChan('${c.key}')"></i></div>`;
            });
        });
    }

    window.setChan = (id) => { activeId = id; loadChans(); loadMsgs(); };
    window.openChanModal = () => document.getElementById('chan-modal').style.display = 'flex';
    window.closeChanModal = () => document.getElementById('chan-modal').style.display = 'none';
    window.addChannel = () => {
        const n = document.getElementById('new-chan-name').value;
        if(!n) return;
        push(ref(db, 'chans_final'), { name: n });
        closeChanModal();
    };
    window.delChan = (id) => { if(confirm("حذف القناة؟")) remove(ref(db, 'chans_final/'+id)); };

    function loadMsgs() {
        onValue(ref(db, 'msgs_final/'+activeId), (snap) => {
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const isMe = myUser && m.uid === myUser.id;
                let body = m.type === 'text' ? m.content : (m.type === 'img' ? `<img src="${m.content}" style="width:100%; border-radius:10px; margin-top:5px;">` : `<video src="${m.content}" controls style="width:100%; border-radius:10px;"></video>`);
                
                flow.innerHTML += `
                    <div class="msg-wrapper ${isMe?'me':''}">
                        <img src="${m.uimg}" class="u-avatar">
                        <div class="bubble">
                            <span class="u-name">${m.uname}</span>
                            ${body}
                            ${isMe ? `<div class="del-msg" onclick="delMsg('${child.key}')">حذف</div>` : ''}
                        </div>
                    </div>
                `;
            });
            flow.scrollTop = flow.scrollHeight;
        });
    }

    window.delMsg = (id) => { if(confirm("حذف الرسالة؟")) remove(ref(db, `msgs_final/${activeId}/${id}`)); };

    // الإرسال
    document.getElementById('send-btn').onclick = () => {
        const txt = document.getElementById('msg-input').value;
        if(!txt || !myUser) return;
        push(ref(db, 'msgs_final/'+activeId), {
            uid: myUser.id, uname: myUser.name, uimg: myUser.img,
            content: txt, type: 'text', time: serverTimestamp()
        });
        document.getElementById('msg-input').value = "";
    };

    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if(!file || !myUser) return;
        const reader = new FileReader();
        const type = file.type.startsWith('image') ? 'img' : 'vid';
        reader.onload = (ev) => {
            push(ref(db, 'msgs_final/'+activeId), {
                uid: myUser.id, uname: myUser.name, uimg: myUser.img,
                content: ev.target.result, type, time: serverTimestamp()
            });
        };
        reader.readAsDataURL(file);
    };

    window.toggleTheme = () => {
        const b = document.body;
        const current = b.getAttribute('data-theme');
        b.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
        document.getElementById('theme-icon').className = current === 'light' ? 'fas fa-sun' : 'fas fa-moon';
    };

    loadChans(); loadMsgs();
</script>
</body>
</html>
