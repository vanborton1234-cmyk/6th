<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنصة العلمية الاحترافية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --energy: #00ffcc;
            --delete: #ff4b2b;
            --bg: #02050a;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0; background: var(--bg); color: #fff;
            overflow-x: hidden;
        }

        /* خلفية الذرات والإلكترونات المتحركة */
        .energy-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at center, #0a192f 0%, #02050a 100%);
            overflow: hidden;
        }
        .electron {
            position: absolute; background: var(--energy);
            border-radius: 50%; box-shadow: 0 0 15px var(--energy);
            animation: flow 10s infinite linear; opacity: 0.4;
        }
        @keyframes flow {
            from { transform: translateY(100vh) translateX(-50px) rotate(0deg); }
            to { transform: translateY(-10vh) translateX(100px) rotate(360deg); }
        }

        .container { max-width: 800px; margin: auto; padding: 20px; position: relative; z-index: 1; }

        /* نافذة التشغيل السريع */
        .quick-play {
            background: linear-gradient(45deg, #111, #222);
            padding: 20px; border-radius: 20px; border: 2px solid var(--neon-blue);
            margin-bottom: 30px; box-shadow: 0 0 20px var(--neon-blue);
        }

        /* كروت المنشورات */
        .post-card {
            background: rgba(20, 30, 48, 0.9);
            border-radius: 15px; margin-bottom: 25px;
            border: 1px solid #333; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .post-card:hover { border-color: var(--energy); }

        .delete-btn {
            position: absolute; top: 15px; left: 15px;
            background: var(--delete); color: white; border: none;
            padding: 5px 10px; border-radius: 5px; cursor: pointer;
            font-size: 12px; font-weight: bold;
        }

        /* مشغل الفيديو المعدل */
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 0 0 15px 15px; overflow: hidden; }
        iframe, video { width: 100%; height: 100%; border: none; }

        /* الأزرار 3D */
        .btn-sci {
            background: linear-gradient(to bottom, var(--neon-blue), var(--neon-purple));
            border: none; padding: 15px; color: white; border-radius: 12px;
            font-weight: bold; cursor: pointer; width: 100%; margin: 10px 0;
            box-shadow: 0 5px 0 #0055aa; transition: 0.1s;
        }
        .btn-sci:active { transform: translateY(4px); box-shadow: 0 0 0 #0055aa; }

        /* الدردشة القوية */
        #chat-box {
            position: fixed; bottom: 20px; left: 20px; width: 350px; height: 450px;
            background: #0f172a; border: 2px solid var(--energy);
            border-radius: 15px; display: none; flex-direction: column; z-index: 1000;
        }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; }
        .msg-item { background: #1e293b; padding: 8px; border-radius: 8px; margin-bottom: 10px; border-right: 3px solid var(--energy); }

        input, textarea {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px;
            border: 1px solid #334155; background: #020617; color: white; box-sizing: border-box;
        }
        
        #login-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div class="energy-bg" id="atoms"></div>

<div id="login-screen">
    <div style="text-align:center; background:#111; padding:40px; border-radius:20px; border:2px solid var(--energy);">
        <h2>مرحباً يا بطل ⚛️</h2>
        <input type="text" id="join-name" placeholder="ادخل اسمك مرة واحدة فقط...">
        <button class="btn-sci" onclick="startApp()">ابدأ الدراسة</button>
    </div>
</div>

<div class="container">
    <h1 style="text-align:center; color:var(--energy); text-shadow: 0 0 15px var(--energy);">المنصة العلمية الكبرى ⚡</h1>

    <div class="quick-play">
        <h3 style="margin-top:0">🔍 تشغيل سريع للمحاضرة</h3>
        <input type="text" id="quick-url" placeholder="الصق رابط يوتيوب هنا للدراسة فوراً...">
        <div id="quick-viewer"></div>
    </div>

    <div class="post-card" style="padding:20px">
        <h3>📢 انشر محتوى جديد</h3>
        <input type="text" id="p-title" placeholder="عنوان الموضوع...">
        <textarea id="p-text" placeholder="اكتب ملاحظاتك هنا..."></textarea>
        <div style="display:flex; gap:10px">
            <input type="text" id="p-yt" placeholder="رابط يوتيوب (اختياري)..." style="flex:2">
            <input type="file" id="p-file" accept="video/*,image/*" style="flex:1; font-size:10px">
        </div>
        <button class="btn-sci" onclick="publishNow()">نشر للعالم 🚀</button>
    </div>

    <div id="main-feed"></div>
</div>

<div id="chat-box">
    <div style="padding:10px; background:var(--energy); color:#000; font-weight:bold; border-radius:12px 12px 0 0">مجموعة النقاش المباشرة</div>
    <div class="chat-msgs" id="chat-list"></div>
    <div style="padding:10px">
        <input type="text" id="chat-in" placeholder="اكتب رسالتك...">
        <button class="btn-sci" style="padding:5px" onclick="sendChat()">إرسال</button>
    </div>
</div>
<button onclick="toggleChat()" style="position:fixed; bottom:20px; left:20px; width:60px; height:60px; border-radius:50%; background:var(--energy); border:none; font-size:24px; cursor:pointer; z-index:1001">💬</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLtjHJIMkLE3CE_WZSDpWQTx_cpTcpycM",
        authDomain: "studyproject-1466b.firebaseapp.com",
        projectId: "studyproject-1466b",
        storageBucket: "studyproject-1466b.firebasestorage.app",
        messagingSenderId: "589724771483",
        appId: "1:589724771483:web:1c53636da586d2c787923e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let myName = localStorage.getItem('user_sci_name');

    if(myName) document.getElementById('login-screen').style.display = 'none';

    window.startApp = () => {
        const n = document.getElementById('join-name').value;
        if(n) { localStorage.setItem('user_sci_name', n); location.reload(); }
    };

    // وظيفة تحويل الروابط لتعمل 100%
    function embedIt(url) {
        if(!url) return null;
        let id = "";
        if(url.includes("v=")) id = url.split("v=")[1].split("&")[0];
        else if(url.includes("youtu.be/")) id = url.split("youtu.be/")[1];
        return id ? `https://www.youtube.com/embed/${id}` : url;
    }

    // التشغيل السريع
    document.getElementById('quick-url').oninput = (e) => {
        const link = embedIt(e.target.value);
        if(link) document.getElementById('quick-viewer').innerHTML = `<div class="video-container"><iframe src="${link}" allowfullscreen></iframe></div>`;
    };

    window.publishNow = async () => {
        const title = document.getElementById('p-title').value;
        const text = document.getElementById('p-text').value;
        const yt = embedIt(document.getElementById('p-yt').value);
        const file = document.getElementById('p-file').files[0];

        let data = { author: myName, title, text, yt, time: Date.now() };

        if(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                data.fileData = e.target.result;
                data.fileType = file.type.split('/')[0];
                push(ref(db, 'posts'), data);
            };
            reader.readAsDataURL(file);
        } else {
            push(ref(db, 'posts'), data);
        }
        alert("تم النشر!");
    };

    onValue(ref(db, 'posts'), (snap) => {
        const feed = document.getElementById('main-feed');
        feed.innerHTML = "";
        snap.forEach(c => {
            const p = c.val();
            const id = c.key;
            let media = "";
            if(p.yt) media = `<div class="video-container"><iframe src="${p.yt}" allowfullscreen></iframe></div>`;
            else if(p.fileType === 'video') media = `<div class="video-container"><video controls src="${p.fileData}"></video></div>`;
            else if(p.fileType === 'image') media = `<img src="${p.fileData}" style="width:100%">`;

            feed.innerHTML = `
            <div class="post-card">
                <button class="delete-btn" onclick="deletePost('${id}')">حذف 🗑️</button>
                <div style="padding:15px">
                    <b style="color:var(--energy)">${p.author}</b>
                    <h2>${p.title}</h2>
                    <p>${p.text}</p>
                </div>
                ${media}
            </div>` + feed.innerHTML;
        });
    });

    window.deletePost = (id) => { if(confirm("هل تريد حذف المنشور نهائياً؟")) remove(ref(db, `posts/${id}`)); };

    // الدردشة
    window.toggleChat = () => {
        const c = document.getElementById('chat-box');
        c.style.display = (c.style.display === 'flex') ? 'none' : 'flex';
    };

    window.sendChat = () => {
        const t = document.getElementById('chat-in').value;
        if(t) { push(ref(db, 'chat'), { user: myName, text: t }); document.getElementById('chat-in').value = ""; }
    };

    onValue(ref(db, 'chat'), (snap) => {
        const l = document.getElementById('chat-list');
        l.innerHTML = "";
        snap.forEach(m => {
            l.innerHTML += `<div class="msg-item"><b>${m.val().user}:</b> ${m.val().text}</div>`;
        });
        l.scrollTop = l.scrollHeight;
