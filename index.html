<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنصة العلمية المتكاملة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        
        :root {
            --primary: #00ffcc;
            --secondary: #0088ff;
            --accent: #ff0055;
            --bg: #05060a;
            --card-bg: rgba(20, 25, 35, 0.95);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0; background: var(--bg); color: #fff;
            overflow-x: hidden;
        }

        /* خلفية الذرات المتحركة */
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at 50% 50%, #1a2a3a 0%, #05060a 100%);
        }

        .container { max-width: 700px; margin: auto; padding: 20px; }

        /* شاشة الدخول */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            display: flex; justify-content: center; align-items: center;
        }

        /* نافذة النشر (ستايل فيسبوك حديث) */
        .publish-box {
            background: var(--card-bg); padding: 20px; border-radius: 15px;
            margin-bottom: 30px; border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }

        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { 
            flex: 1; padding: 10px; border-radius: 8px; border: none; 
            background: rgba(255,255,255,0.1); color: white; cursor: pointer;
        }
        .tab-btn.active { background: var(--primary); color: #000; font-weight: bold; }

        input, textarea {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px;
            border: 1px solid #444; background: rgba(0,0,0,0.5); color: #fff;
            box-sizing: border-box; font-family: 'Tajawal';
        }

        /* قسم الومضات (Reels Style) */
        .reels-container {
            display: flex; overflow-x: auto; gap: 15px; padding: 10px 0;
            scrollbar-width: none; margin-bottom: 30px;
        }
        .reel-card {
            min-width: 150px; height: 250px; background: #000;
            border-radius: 15px; border: 2px solid var(--accent);
            position: relative; overflow: hidden; flex-shrink: 0;
            cursor: pointer;
        }
        .reel-card video, .reel-card iframe { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .reel-label { position: absolute; bottom: 10px; right: 10px; font-size: 12px; background: var(--accent); padding: 2px 8px; border-radius: 5px; }

        /* المنشورات */
        .post {
            background: var(--card-bg); border-radius: 15px; margin-bottom: 25px;
            border: 1px solid #333; overflow: hidden; animation: fadeInUp 0.4s ease;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .post-img { width: 100%; max-height: 500px; object-fit: contain; background: #000; }
        .post-video { width: 100%; aspect-ratio: 16/9; border: none; }

        /* الأزرار 3D */
        .btn-action {
            background: linear-gradient(180deg, var(--primary), #00ccaa);
            border: none; padding: 12px; color: #000; border-radius: 10px;
            font-weight: bold; cursor: pointer; width: 100%;
            box-shadow: 0 4px 0 #008877; transition: 0.1s;
        }
        .btn-action:active { transform: translateY(4px); box-shadow: 0 0 0 #008877; }

        /* الدردشة */
        #chat-toggle {
            position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px;
            background: var(--secondary); border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 25px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 136, 255, 0.4); z-index: 1000;
        }
    </style>
</head>
<body>

<div class="particles"></div>

<div id="login-overlay">
    <div style="background:var(--card-bg); padding:30px; border-radius:20px; border:1px solid var(--primary); text-align:center;">
        <h2>مرحباً بك في منصتك العلمية ⚛️</h2>
        <input type="text" id="user-name" placeholder="اكتب اسمك هنا...">
        <button class="btn-action" onclick="saveUser()">دخول للمنصة</button>
    </div>
</div>

<div class="container">
    <h1 style="text-align:center; color:var(--primary); text-shadow: 0 0 10px var(--primary);">الموجز العلمي 🚀</h1>

    <h3 style="color:var(--accent)">⚡ الومضات السريعة</h3>
    <div class="reels-container" id="reels-feed">
        </div>

    <div class="publish-box">
        <div class="tabs">
            <button class="tab-btn active" onclick="setMode('text')">📝 منشور</button>
            <button class="tab-btn" onclick="setMode('video')">🎬 فيديو</button>
            <button class="tab-btn" onclick="setMode('image')">🖼️ صورة</button>
        </div>
        
        <input type="text" id="post-title" placeholder="عنوان المنشور أو المحاضرة...">
        <textarea id="post-content" placeholder="اكتب كلامك هنا..." rows="3"></textarea>
        
        <div id="video-input-group" style="display:none;">
            <input type="text" id="post-url" placeholder="ضع رابط يوتيوب هنا...">
            <label><input type="checkbox" id="is-reel"> هل هذا فيديو قصير (Reel)؟</label>
        </div>

        <div id="image-input-group" style="display:none;">
            <input type="file" id="post-file" accept="image/*">
        </div>

        <button class="btn-action" onclick="handlePublish()">نشر الآن</button>
    </div>

    <div id="main-feed"></div>
</div>

<div id="chat-toggle" onclick="alert('سيتم فتح الجروب قريباً!')">💬</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLtjHJIMkLE3CE_WZSDpWQTx_cpTcpycM",
        authDomain: "studyproject-1466b.firebaseapp.com",
        projectId: "studyproject-1466b",
        storageBucket: "studyproject-1466b.firebasestorage.app",
        messagingSenderId: "589724771483",
        appId: "1:589724771483:web:1c53636da586d2c787923e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let mode = 'text';
    let user = localStorage.getItem('sci_name');

    if(user) document.getElementById('login-overlay').style.display = 'none';

    window.saveUser = () => {
        const name = document.getElementById('user-name').value;
        if(name) { localStorage.setItem('sci_name', name); location.reload(); }
    };

    window.setMode = (m) => {
        mode = m;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('video-input-group').style.display = m === 'video' ? 'block' : 'none';
        document.getElementById('image-input-group').style.display = m === 'image' ? 'block' : 'none';
    };

    // تحويل رابط يوتيوب ليعمل 100%
    function cleanUrl(url) {
        let id = "";
        if(url.includes("v=")) id = url.split("v=")[1].split("&")[0];
        else if(url.includes("youtu.be/")) id = url.split("youtu.be/")[1].split("?")[0];
        else if(url.includes("embed/")) id = url.split("embed/")[1];
        return id ? `https://www.youtube.com/embed/${id}?autoplay=0&rel=0` : null;
    }

    window.handlePublish = async () => {
        const title = document.getElementById('post-title').value;
        const text = document.getElementById('post-content').value;
        const url = document.getElementById('post-url').value;
        const isReel = document.getElementById('is-reel').checked;
        const file = document.getElementById('post-file').files[0];

        let postData = { author: user, title, text, type: mode, time: Date.now() };

        if(mode === 'video') {
            postData.url = cleanUrl(url);
            postData.isReel = isReel;
        } else if(mode === 'image' && file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                postData.imgData = e.target.result;
                push(ref(db, 'all_posts'), postData);
            };
            reader.readAsDataURL(file);
            return;
        }
        
        push(ref(db, 'all_posts'), postData);
        alert("تم النشر!");
    };

    onValue(ref(db, 'all_posts'), (snap) => {
        const feed = document.getElementById('main-feed');
        const reels = document.getElementById('reels-feed');
        feed.innerHTML = ""; reels.innerHTML = "";
        
        snap.forEach(child => {
            const p = child.val();
            if(p.type === 'video' && p.isReel) {
                reels.innerHTML += `<div class="reel-card"><iframe src="${p.url}" frameborder="0"></iframe><div class="reel-label">${p.title}</div></div>`;
            } else {
                let content = "";
                if(p.type === 'video') content = `<iframe class="post-video" src="${p.url}" allowfullscreen></iframe>`;
                if(p.type === 'image') content = `<img src="${p.imgData}" class="post-img">`;
                
                feed.innerHTML = `
                <div class="post">
                    <div style="padding:15px; border-bottom:1px solid #333">
                        <b style="color:var(--primary)">${p.author}</b> • <small>الآن</small>
                        <h3 style="margin:10px 0 0 0">${p.title}</h3>
                        <p style="font-size:14px; color:#ccc">${p.text}</p>
                    </div>
                    ${content}
                </div>` + feed.innerHTML;
            }
        });
    });
</script>
</body>
</html>
