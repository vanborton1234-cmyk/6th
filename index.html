<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إنجازاتي | النسخة الذرية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        :root { --primary: #00f2ff; --accent: #7000ff; --bg: #05060a; --danger: #ff3333; }
        body, html { margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }
        
        #canvas-bg { position: fixed; inset: 0; z-index: -1; }
        #eagle-bg { position: fixed; inset: 0; z-index: -1; display: none; background: url('https://w0.peakpx.com/wallpaper/559/550/HD-wallpaper-blue-eagle-digital-art-birds-eagle-blue-animal.jpg') no-repeat center; background-size: cover; opacity: 0.2; }

        /* إشعار البث المباشر */
        #live-notifier {
            display: none; background: var(--danger); color: white; text-align: center;
            padding: 8px; font-weight: bold; cursor: pointer; animation: pulse 1.5s infinite;
            position: fixed; top: 115px; left: 0; right: 0; z-index: 1500; font-size: 13px;
        }
        @keyframes pulse { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        /* شريط الحالة العلوي والسشنات */
        #status-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(10, 10, 20, 0.98); padding: 15px; border-bottom: 1.5px solid var(--primary); text-align: center; }
        #sess-display { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--primary); border-radius: 8px; padding: 5px 10px; display: inline-block; margin-bottom: 10px; min-width: 200px; }

        .chat-container { display: flex; flex-direction: column; height: 100vh; padding-top: 135px; padding-bottom: 85px; box-sizing: border-box; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }

        /* فقاعات الرسائل */
        .msg-wrapper { display: flex; gap: 10px; max-width: 85%; align-items: flex-start; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from {opacity: 0; transform: translateY(5px);} to {opacity: 1; transform: translateY(0);} }
        .msg-wrapper.me { flex-direction: row-reverse; align-self: flex-end; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--primary); object-fit: cover; }
        .msg-body { background: #161821; padding: 10px 15px; border-radius: 18px; position: relative; border: 1px solid #2a2a2a; }
        .me .msg-body { background: var(--accent); border: none; }
        .user-name { font-size: 11px; color: var(--primary); margin-bottom: 4px; display: block; font-weight: bold; }
        .del-btn { font-size: 11px; color: #ff4d4d; cursor: pointer; margin-right: 8px; opacity: 0.5; }

        /* شريط البث والإدخال */
        #live-overlay { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; }
        .input-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0f1015; padding: 15px; display: flex; gap: 12px; align-items: center; z-index: 1000; border-top: 1px solid #222; }
        .input-bar input { flex: 1; background: #000; border: 1px solid #333; padding: 12px 18px; border-radius: 25px; color: #fff; outline: none; font-size: 15px; }
        .btn-icon { color: var(--primary); font-size: 26px; cursor: pointer; transition: 0.2s; }

        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>
<div id="eagle-bg"></div>

<div id="live-notifier" onclick="toggleLive(true)">🔴 يوجد بث مباشر حالياً - اضغط للانضمام</div>

<div id="login-screen">
    <div style="background:#13151d; padding:35px; border-radius:25px; text-align:center; border:1px solid var(--primary); width:85%; max-width:340px;">
        <h2 style="color:var(--primary); margin-top:0;">منصة إنجازاتي ⚛️</h2>
        <img id="p-prev" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:90px; height:90px; border-radius:50%; border:2px solid var(--primary); cursor:pointer; object-fit: cover;" onclick="document.getElementById('p-file').click()">
        <input type="file" id="p-file" hidden onchange="previewImg(this)">
        <input type="text" id="p-name" placeholder="ادخل اسمك هنا" style="width:100%; padding:14px; margin:20px 0; border-radius:12px; border:1px solid #333; background:#000; color:#fff; text-align:center; font-size:16px;">
        <button onclick="doSave()" style="width:100%; padding:14px; background:var(--primary); border:none; border-radius:12px; font-weight:bold; cursor:pointer; color:#000;">دخول للمنصة</button>
    </div>
</div>

<div id="status-bar">
    <div id="sess-display">
        <span id="sess-text" style="font-weight:bold; font-size:15px;">جاري تحميل السشن...</span>
    </div>
    <div style="display:flex; justify-content:center; gap:30px; margin-top:5px;">
        <i class="fas fa-atom btn-icon" onclick="setTheme('atom')"></i>
        <i class="fas fa-feather-alt btn-icon" onclick="setTheme('eagle')"></i>
        <i class="fas fa-video btn-icon" style="color:var(--danger);" onclick="toggleLive(true)"></i>
    </div>
</div>

<div id="live-overlay">
    <div style="padding:10px; background:#111; display:flex; justify-content:space-between; align-items:center;">
        <span style="color:var(--danger); font-weight:bold;">🔴 البث المباشر (آمن)</span>
        <button onclick="toggleLive(false)" style="background:red; color:#fff; border:none; padding:8px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">إغلاق</button>
    </div>
    <iframe id="live-frame" src="" style="width:100%; height:calc(100% - 60px); border:none;" allow="camera; microphone; fullscreen; display-capture"></iframe>
</div>

<div class="chat-container">
    <div id="chat-box"></div>
</div>

<div class="input-bar">
    <i class="fas fa-image btn-icon" onclick="document.getElementById('m-file').click()"></i>
    <input type="file" id="m-file" hidden accept="image/*" onchange="uploadMedia(this)">
    <input type="text" id="m-text" placeholder="اكتب رسالتك الآن...">
    <i class="fas fa-paper-plane btn-icon" onclick="doSend()"></i>
</div>

<audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, serverTimestamp, set, onDisconnect } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLtjHJIMkLE3CE_WZSDpWQTx_cpTcpycM",
        authDomain: "studyproject-1466b.firebaseapp.com",
        projectId: "studyproject-1466b",
        databaseURL: "https://studyproject-1466b-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let me = JSON.parse(localStorage.getItem('enjaz_final_v6'));
    if(!me) document.getElementById('login-screen').style.display = 'flex';

    window.previewImg = (i) => { const r=new FileReader(); r.onload=(e)=>document.getElementById('p-prev').src=e.target.result; r.readAsDataURL(i.files[0]); };
    window.doSave = () => {
        const n = document.getElementById('p-name').value;
        const p = document.getElementById('p-prev').src;
        if(!n) return alert("ادخل اسمك");
        me = { n, p, id: "U" + Date.now() };
        localStorage.setItem('enjaz_final_v6', JSON.stringify(me));
        location.reload();
    };

    // --- نظام السشنات الكامل ---
    const schedule = [
        { n: "السشن الأول", h1: 6, m1: 0, h2: 8, m2: 0 },
        { n: "السشن الثاني", h1: 8, m1: 15, h2: 10, m2: 15 },
        { n: "السشن الثالث", h1: 10, m1: 30, h2: 12, m2: 0 },
        { n: "السشن الرابع", h1: 13, m1: 0, h2: 15, m2: 0 },
        { n: "السشن الخامس", h1: 15, m1: 15, h2: 17, m2: 15 },
        { n: "السشن السادس", h1: 17, m1: 30, h2: 18, m2: 30 },
        { n: "السشن السابع", h1: 20, m1: 0, h2: 22, m2: 0 }
    ];

    let lastS = "";
    function updateSess() {
        const now = new Date();
        const cur = now.getHours() * 60 + now.getMinutes();
        let act = schedule.find(s => cur >= (s.h1*60+s.m1) && cur < (s.h2*60+s.m2));
        const el = document.getElementById('sess-text');
        if(act) {
            const rem = (act.h2*60+act.m2) - cur;
            el.innerHTML = `<span style="color:var(--primary)">🔴 الآن: ${act.n}</span> | متبقي ${rem} دقيقة`;
            if(lastS !== act.n) { document.getElementById('alert-sound').play(); lastS = act.n; }
        } else { el.innerText = "وقت استراحة ودراسة حرة ☕"; }
    }
    setInterval(updateSess, 5000); updateSess();

    // --- البث المباشر وكاشفه ---
    const liveRef = ref(db, 'live_now');
    window.toggleLive = (show) => {
        const frame = document.getElementById('live-frame');
        document.getElementById('live-overlay').style.display = show ? 'block' : 'none';
        if(show) {
            frame.src = "https://meet.jit.si/Enjaz_Secure_AbuHussein_2026";
            set(liveRef, { active: true, user: me.n });
            onDisconnect(liveRef).remove();
        } else {
            frame.src = ""; remove(liveRef);
        }
    };
    onValue(liveRef, (s) => {
        const notify = document.getElementById('live-notifier');
        if(s.exists()) {
            notify.style.display = 'block';
            notify.innerText = `🔴 ${s.val().user} بدأ بثاً مباشراً - انضم الآن`;
        } else { notify.style.display = 'none'; }
    });

    // --- المراسلة الفائقة السرعة ---
    window.doSend = () => {
        const txt = document.getElementById('m-text').value;
        if(!txt) return;
        push(ref(db, 'chat_v6'), { uid: me.id, user: me.n, pic: me.p, msg: txt, type: 'text', time: serverTimestamp() });
        document.getElementById('m-text').value = "";
    };

    window.uploadMedia = (i) => {
        const r = new FileReader();
        r.onload = (e) => {
            push(ref(db, 'chat_v6'), { uid: me.id, user: me.n, pic: me.p, media: e.target.result, type: 'img', time: serverTimestamp() });
        };
        r.readAsDataURL(i.files[0]);
    };

    onValue(ref(db, 'chat_v6'), (snap) => {
        const box = document.getElementById('chat-box'); box.innerHTML = "";
        snap.forEach(c => {
            const d = c.val(); const isMe = d.uid === me.id;
            const content = d.type === 'text' ? d.msg : `<img src="${d.media}" style="width:100%; border-radius:12px;">`;
            box.innerHTML += `
                <div class="msg-wrapper ${isMe ? 'me' : ''}">
                    <img src="${d.pic}" class="avatar">
                    <div class="msg-body">
                        <span class="user-name">${d.user}</span>
                        ${content}
                        <i class="fas fa-trash del-btn" onclick="remove(ref(db, 'chat_v6/${c.key}'))"></i>
                    </div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    });

    window.setTheme = (t) => {
        document.getElementById('canvas-bg').style.display = t==='atom'?'block':'none';
        document.getElementById('eagle-bg').style.display = t==='eagle'?'block':'none';
    };

    // تحريك الذرات
    const canvas = document.getElementById('canvas-bg'); const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = [];
    class Part { constructor() { this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.vx=Math.random()-0.5; this.vy=Math.random()-0.5; } update() { this.x+=this.vx; this.y+=this.vy; ctx.fillStyle="#00f2ff"; ctx.beginPath(); ctx.arc(this.x,this.y,1,0,Math.PI*2); ctx.fill(); } }
    for(let i=0;i<40;i++) particles.push(new Part());
    function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>p.update()); requestAnimationFrame(anim); }
    anim();
</script>
</body>
</html>
