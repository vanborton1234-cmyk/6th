<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إنجازاتي | Enjazati</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        :root {
            --primary: #00f2ff; --accent: #7000ff; --bg: #0a0b10; --card: rgba(25, 28, 35, 1);
        }

        body, html {
            margin: 0; padding: 0; font-family: 'Tajawal', sans-serif;
            background: var(--bg); color: #fff; height: 100%; overflow: hidden;
        }

        #atom-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* الإشعار العائم العلوي */
        #floating-status {
            position: fixed; top: 10px; left: 10px; right: 10px;
            background: linear-gradient(135deg, var(--accent), #4a00e0);
            padding: 12px; border-radius: 12px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000;
            border: 1px solid var(--primary); font-size: 14px;
        }

        /* حاوية الشات */
        .app-container {
            display: flex; flex-direction: column; height: 100vh;
        }

        .chat-area {
            flex: 1; overflow-y: auto; padding: 80px 15px 80px 15px;
            display: flex; flex-direction: column; gap: 10px;
        }

        /* فقاعات الرسائل */
        .msg { max-width: 85%; align-self: flex-start; }
        .msg.me { align-self: flex-end; }
        
        .msg-bubble {
            background: #1e2129; padding: 10px 15px; border-radius: 15px;
            position: relative; border: 1px solid #333; word-wrap: break-word;
        }
        .me .msg-bubble { background: var(--accent); border: none; }

        .user-info { font-size: 11px; color: var(--primary); margin-bottom: 3px; display: flex; align-items: center; gap: 5px; }
        .avatar { width: 22px; height: 22px; border-radius: 50%; }

        .del-btn { color: #ff4d4d; font-size: 12px; margin-right: 10px; cursor: pointer; }

        /* منطقة الإرسال الثابتة */
        .input-box {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--card); padding: 15px;
            display: flex; gap: 10px; align-items: center;
            border-top: 1px solid #333; z-index: 1000;
        }

        input[type="text"] {
            flex: 1; background: #000; border: 1px solid #444;
            padding: 12px 15px; border-radius: 25px; color: #fff; outline: none;
        }

        .icon-btn { color: var(--primary); font-size: 22px; cursor: pointer; }

        /* شاشة الدخول */
        .overlay {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 5000; display: none; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<canvas id="atom-canvas"></canvas>

<div id="floating-status">
    <div id="status-text">جاري فحص الوقت...</div>
    <div id="countdown-text" style="font-size: 12px; opacity: 0.9;">--:--</div>
</div>

<div class="app-container">
    <div class="chat-area" id="chat-box"></div>
    
    <div class="input-box">
        <i class="fas fa-camera icon-btn" onclick="document.getElementById('file-in').click()"></i>
        <input type="file" id="file-in" hidden accept="image/*,video/*" onchange="uploadFile(this)">
        <input type="text" id="msg-in" placeholder="أرسل إنجازك الآن...">
        <i class="fas fa-paper-plane icon-btn" onclick="sendMsg()"></i>
    </div>
</div>

<div id="login-overlay" class="overlay">
    <div style="background:var(--card); padding:25px; border-radius:15px; text-align:center; width:85%; max-width:320px; border:1px solid var(--primary);">
        <h3 style="color:var(--primary); margin-top:0;">إنجازاتي</h3>
        <img id="p-preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:70px; height:70px; border-radius:50%; border:2px solid var(--primary);" onclick="document.getElementById('p-file').click()">
        <input type="file" id="p-file" hidden onchange="previewProfile(this)">
        <input type="text" id="p-name" placeholder="اكتب اسمك هنا" style="width:95%; padding:10px; margin:15px 0; border-radius:8px; border:1px solid #444; background:#000; color:#fff;">
        <button onclick="saveProfile()" style="width:100%; padding:10px; background:var(--primary); border:none; border-radius:8px; font-weight:bold;">ابدأ الآن</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLtjHJIMkLE3CE_WZSDpWQTx_cpTcpycM",
        authDomain: "studyproject-1466b.firebaseapp.com",
        projectId: "studyproject-1466b",
        storageBucket: "studyproject-1466b.firebasestorage.app",
        messagingSenderId: "589724771483",
        appId: "1:589724771483:web:1c53636da586d2c787923e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- نظام الذرات ---
    const canvas = document.getElementById('atom-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = [];
    class P { constructor() { this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.vx=(Math.random()-0.5); this.vy=(Math.random()-0.5); } update() { this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>canvas.width)this.vx*=-1; if(this.y<0||this.y>canvas.height)this.vy*=-1; ctx.fillStyle="#00f2ff"; ctx.beginPath(); ctx.arc(this.x,this.y,1,0,Math.PI*2); ctx.fill(); } }
    for(let i=0;i<40;i++) particles.push(new P());
    function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>p.update()); requestAnimationFrame(anim); }
    anim();

    // --- إدارة المستخدم ---
    let myUser = JSON.parse(localStorage.getItem('enjaz_user_v3'));
    if(!myUser) document.getElementById('login-overlay').style.display = 'flex';

    window.previewProfile = (i) => { const r=new FileReader(); r.onload=(e)=>document.getElementById('p-preview').src=e.target.result; r.readAsDataURL(i.files[0]); };
    window.saveProfile = () => {
        const n = document.getElementById('p-name').value;
        const p = document.getElementById('p-preview').src;
        if(!n) return;
        myUser = { n, p, id: Date.now() };
        localStorage.setItem('enjaz_user_v3', JSON.stringify(myUser));
        location.reload();
    };

    // --- نظام الوقت 12 ساعة وجدول السشنات ---
    const schedule = [
        { n: "السشن الأول", h1: 6, m1: 0, h2: 8, m2: 0 },
        { n: "وقت استراحة ☕", h1: 8, m1: 0, h2: 8, m2: 15 },
        { n: "السشن الثاني", h1: 8, m1: 15, h2: 10, m2: 15 },
        { n: "وقت استراحة ☕", h1: 10, m1: 15, h2: 10, m2: 30 },
        { n: "السشن الثالث", h1: 10, m1: 30, h2: 12, m2: 0 },
        { n: "السشن الثالث (ب)", h1: 13, m1: 0, h2: 15, m2: 0 },
        { n: "وقت استراحة ☕", h1: 15, m1: 0, h2: 15, m2: 15 },
        { n: "السشن الرابع", h1: 15, m1: 15, h2: 17, m2: 15 },
        { n: "وقت استراحة ☕", h1: 17, m1: 15, h2: 17, m2: 30 },
        { n: "السشن الخامس", h1: 17, m1: 30, h2: 18, m2: 30 },
        { n: "السشن السادس", h1: 20, m1: 0, h2: 22, m2: 0 }
    ];

    function to12h(h, m) {
        let ampm = h >= 12 ? 'م' : 'ص';
        h = h % 12 || 12;
        return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
    }

    let currentActiveName = "";

    function updateClock() {
        const now = new Date();
        const curMin = now.getHours() * 60 + now.getMinutes();
        let active = null;

        schedule.forEach(s => {
            if(curMin >= (s.h1*60+s.m1) && curMin < (s.h2*60+s.m2)) active = s;
        });

        const status = document.getElementById('status-text');
        const count = document.getElementById('countdown-text');

        if(active) {
            const remaining = (active.h2*60+active.m2) - curMin;
            status.innerHTML = `⚠️ <b>${active.n}</b> (من ${to12h(active.h1, active.m1)} إلى ${to12h(active.h2, active.m2)})`;
            count.innerText = `المدة المتبقية: ${remaining} دقيقة`;
            
            // إرسال رسالة آلية في الشات عند بداية السشن
            if(currentActiveName !== active.n) {
                push(ref(db, 'chat_v3'), { type: 'sys', txt: `📢 بدأ الآن: ${active.n}`, time: serverTimestamp() });
                currentActiveName = active.n;
            }
        } else {
            status.innerText = "لا يوجد سشن حالياً.. استعد للقادم!";
            count.innerText = "--:--";
            currentActiveName = "";
        }

        // الحذف اليومي
        const d = now.toLocaleDateString();
        if(localStorage.getItem('last_clear') !== d) {
            remove(ref(db, 'chat_v3'));
            localStorage.setItem('last_clear', d);
        }
    }
    setInterval(updateClock, 1000);

    // --- وظائف الشات ---
    window.sendMsg = () => {
        const txt = document.getElementById('msg-in').value;
        if(!txt) return;
        push(ref(db, 'chat_v3'), {
            uid: myUser.id, u: myUser.n, p: myUser.p, txt, type: 'text', time: serverTimestamp()
        });
        document.getElementById('msg-in').value = "";
    };

    window.uploadFile = (i) => {
        const r = new FileReader();
        const type = i.files[0].type.startsWith('image') ? 'img' : 'vid';
        r.onload = (e) => {
            push(ref(db, 'chat_v3'), {
                uid: myUser.id, u: myUser.n, p: myUser.p, media: e.target.result, type, time: serverTimestamp()
            });
        };
        r.readAsDataURL(i.files[0]);
    };

    window.deleteMsg = (k) => {
        if(confirm("حذف هذه الرسالة؟")) remove(ref(db, `chat_v3/${k}`));
    };

    onValue(ref(db, 'chat_v3'), (snap) => {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        snap.forEach(c => {
            const d = c.val();
            const k = c.key;
            if(d.type === 'sys') {
                box.innerHTML += `<div style="text-align:center; font-size:12px; color:var(--primary); margin:10px 0;">${d.txt}</div>`;
            } else {
                const isMe = d.uid === myUser.id;
                let content = d.type === 'text' ? d.txt : 
                             (d.type === 'img' ? `<img src="${d.media}" style="width:100%; border-radius:10px;">` : `<video src="${d.media}" controls style="width:100%; border-radius:10px;"></video>`);
                
                box.innerHTML += `
                    <div class="msg ${isMe ? 'me' : ''}">
                        <div class="user-info">
                            <img src="${d.p}" class="avatar">
                            <b>${d.u}</b>
                            <span class="del-btn" onclick="deleteMsg('${k}')"><i class="fas fa-trash"></i></span>
                        </div>
                        <div class="msg-bubble">${content}</div>
                    </div>
                `;
            }
        });
        box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
    });

</script>
</body>
</html>
