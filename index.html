<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> | Beta مجتمع </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        :root {
            --primary: #00d2ff;
            --secondary: #9d50bb;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1e293b;
            --border: rgba(0,0,0,0.08);
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; font-family: 'Tajawal', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

        /* شريط السشنات العلوي المطور */
        .top-session-bar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; padding: 10px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; gap: 8px; position: relative; z-index: 10;
        }
        .session-header { display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: bold; }
        .iraq-clock { background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 12px; font-size: 13px; }
        .session-details { display: flex; justify-content: space-around; align-items: center; background: rgba(255,255,255,0.15); padding: 8px; border-radius: 10px; font-size: 13px; }
        .session-controls button {
            border: none; padding: 6px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px;
        }
        .btn-start { background: #38ef7d; color: #000; }
        .btn-cancel { background: #ff4b4b; color: #fff; }

        /* شاشة الحماية وتكوين الحساب */
        #gate-overlay, .modal-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .modal-overlay { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; z-index: 5000; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; box-shadow: var(--shadow); }

        /* الهيكل الأساسي */
        .app-shell { 
            display: flex; flex-direction: column; height: calc(100dvh - 90px); 
            max-width: 600px; margin: 0 auto; background: var(--card); box-shadow: var(--shadow);
        }

        header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        /* أشرطة التمرير (القنوات والروابط) */
        .scroll-bar { display: flex; gap: 8px; padding: 10px 15px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; align-items: center;}
        .scroll-bar::-webkit-scrollbar { display: none; }
        .btn-pill { padding: 6px 14px; border-radius: 18px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; white-space: nowrap; font-size: 13px; text-decoration: none; font-weight: bold; }
        .btn-pill.active { background: var(--primary); color: white; border-color: var(--primary); }
        .link-pill { color: white; border: none; }

        /* منطقة الدردشة */
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; background: var(--bg); display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }

        /* الرسائل */
        .msg-wrapper { display: flex; gap: 10px; max-width: 95%; align-items: flex-end; }
        .msg-wrapper.me { align-self: flex-end; flex-direction: row-reverse; }
        .u-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); flex-shrink: 0; }
        .bubble { background: var(--card); padding: 10px 15px; border-radius: 18px; border: 1px solid var(--border); color: var(--text); font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); min-width: 150px; position: relative; }
        .me .bubble { background: var(--primary); color: white; border: none; border-bottom-right-radius: 4px; }
        .other .bubble { border-bottom-left-radius: 4px; }
        .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-bottom: 1px solid rgba(128,128,128,0.2); padding-bottom: 4px; }
        .u-name { font-size: 11px; font-weight: bold; }
        .u-phone { font-size: 9px; opacity: 0.7; margin-right: 5px; }
        .msg-time { font-size: 10px; opacity: 0.7; display: block; text-align: left; margin-top: 5px; }

        /* إدخال الرسائل */
        .input-bar { padding: 12px 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid var(--border); background: var(--card); }
        .input-bar input[type="text"] { flex: 1; padding: 12px 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; font-size: 14px; }
        .icon-btn { font-size: 20px; color: var(--primary); cursor: pointer; }

        .styled-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 10px; outline: none; background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif;}
        .styled-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px;}
    </style>
</head>
<body data-theme="light">

<!-- شريط السشنات -->
<div class="top-session-bar" id="session-bar">
    <div class="session-header">
        <span>بومودورو الإنجاز 🧠</span>
        <span class="iraq-clock" id="iraq-clock">جاري التحميل...</span>
    </div>
    <div class="session-details" id="session-details">
        <span id="s-status">لا يوجد سشن نشط</span>
        <span id="s-start">البداية: --:--</span>
        <span id="s-rem">المتبقي: --:--</span>
    </div>
    <div class="session-controls">
        <button class="btn-start" onclick="startSession()">▶ بدء سشن (50د)</button>
        <button class="btn-cancel" onclick="cancelSession()">✖ إلغاء</button>
    </div>
</div>

<div id="gate-overlay">
    <h2 style="color: var(--primary);"> مجتمع Beta </h2>
    <p>أدخل رمز الدخول</p>
    <input type="password" id="gate-pass" placeholder="••••••••" class="styled-input" style="text-align:center; font-size:20px; width:200px;">
</div>

<div class="app-shell">
    <header>
        <div onclick="toggleTheme()" style="cursor:pointer;"><i id="theme-icon" class="fas fa-moon"></i></div>
        <b style="color: var(--primary); font-size: 18px;">AM ros v5</b>
        <i class="fas fa-plus-circle icon-btn" onclick="openChanModal()"></i>
    </header>

    <!-- شريط القنوات -->
    <div class="scroll-bar" id="chan-list"></div>
    
    <!-- شريط مجتمع Beta والروابط المخصصة -->
    <div class="scroll-bar" id="links-list" style="background: var(--card); padding-top: 5px;">
        <span style="font-size: 11px; font-weight: bold; margin-left: 5px; color: gray;">مجتمع Beta:</span>
        <a href="https://t.me/Beta_s5/1" target="_blank" class="btn-pill link-pill" style="background: #00d2ff;">الرئيسية</a>
        <a href="https://t.me/Beta_s5/38" target="_blank" class="btn-pill link-pill" style="background: #11998e;">المكتبة الاسلامية</a>
        <a href="https://t.me/Beta_s5/396" target="_blank" class="btn-pill link-pill" style="background: #9d50bb;">النهضة الشيعية</a>
        <span id="custom-links-container" style="display: contents;"></span>
        <button class="btn-pill" onclick="document.getElementById('link-modal').style.display='flex'" style="border-style: dashed;">➕ إضافة</button>
    </div>

    <main class="chat-area" id="chat-flow"></main>

    <div class="input-bar">
        <i class="fas fa-camera icon-btn" onclick="document.getElementById('file-input').click()"></i>
        <input type="file" id="file-input" hidden accept="image/*,video/*">
        <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا...">
        <i class="fas fa-paper-plane icon-btn" id="send-btn"></i>
    </div>
</div>

<!-- نافذة التسجيل -->
<div id="profile-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>تسجيل الدخول</h3>
        <img id="p-img-prev" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--primary); object-fit:cover; cursor:pointer; margin-bottom: 10px;">
        <input type="file" id="p-img-file" hidden accept="image/*">
        <input type="text" id="p-name-in" placeholder="اسمك" class="styled-input">
        <input type="text" id="p-phone-in" placeholder="رقمك (اختياري)" class="styled-input">
        <button class="styled-btn" onclick="finishProfile()">دخول</button>
    </div>
</div>

<!-- نافذة إضافة قناة -->
<div id="chan-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>إنشاء قناة جديدة</h3>
        <input type="text" id="new-chan-name" placeholder="اسم القناة" class="styled-input">
        <select id="new-chan-type" class="styled-input">
            <option value="public">🌐 قناة عامة</option>
            <option value="private">🔒 قناة خاصة</option>
        </select>
        <button class="styled-btn" onclick="addChannel()">إنشاء</button>
        <button onclick="document.getElementById('chan-modal').style.display='none'" style="margin-top:10px; background:none; border:none; color:#888; cursor:pointer;">إلغاء</button>
    </div>
</div>

<!-- نافذة إضافة رابط -->
<div id="link-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>إضافة زر مخصص</h3>
        <input type="text" id="new-link-name" placeholder="اسم الزر" class="styled-input">
        <input type="url" id="new-link-url" placeholder="الرابط (URL)" class="styled-input">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px; justify-content: center;">
            <label>اختر لون الزر:</label>
            <input type="color" id="new-link-color" value="#ff9900" style="border:none; width:40px; height:40px; cursor:pointer;">
        </div>
        <button class="styled-btn" onclick="addCustomLink()">تم الحفظ</button>
        <button onclick="document.getElementById('link-modal').style.display='none'" style="margin-top:10px; background:none; border:none; color:#888; cursor:pointer;">إلغاء</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLtjHJIMkLE3CE_WZSDpWQTx_cpTcpycM",
        authDomain: "studyproject-1466b.firebaseapp.com",
        projectId: "studyproject-1466b",
        storageBucket: "studyproject-1466b.firebasestorage.app",
        messagingSenderId: "589724771483",
        appId: "1:589724771483:web:1c53636da586d2c787923e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- نظام تسجيل الدخول والحماية ---
    let myUser = JSON.parse(localStorage.getItem('enjaz_user_final_v2'));
    const isVerified = localStorage.getItem('gate_ok') === 'true';

    if(isVerified) {
        document.getElementById('gate-overlay').style.display = 'none';
        if(!myUser) document.getElementById('profile-modal').style.display = 'flex';
    }

    document.getElementById('gate-pass').oninput = (e) => {
        if(e.target.value === '166277399') {
            localStorage.setItem('gate_ok', 'true');
            document.getElementById('gate-overlay').style.display = 'none';
            if(!myUser) document.getElementById('profile-modal').style.display = 'flex';
        }
    };

    document.getElementById('p-img-prev').onclick = () => document.getElementById('p-img-file').click();
    document.getElementById('p-img-file').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => document.getElementById('p-img-prev').src = ev.target.result;
        r.readAsDataURL(e.target.files[0]);
    };

    window.finishProfile = () => {
        const name = document.getElementById('p-name-in').value;
        const phone = document.getElementById('p-phone-in').value || 'بدون رقم';
        const img = document.getElementById('p-img-prev').src;
        if(!name) return alert("يرجى كتابة الاسم");
        myUser = { id: 'u'+Date.now(), name, phone, img };
        localStorage.setItem('enjaz_user_final_v2', JSON.stringify(myUser));
        location.reload();
    };

    // --- ساعة العراق ونظام السشنات ---
    function updateClock() {
        const timeOptions = { timeZone: 'Asia/Baghdad', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
        document.getElementById('iraq-clock').innerText = new Intl.DateTimeFormat('ar-IQ', timeOptions).format(new Date());
    }
    setInterval(updateClock, 1000); updateClock();

    function formatTimeObject(dateObj) {
        let hours = dateObj.getHours(); let minutes = dateObj.getMinutes();
        const ampm = hours >= 12 ? 'م' : 'ص';
        hours = hours % 12; hours = hours ? hours : 12; 
        minutes = minutes < 10 ? '0' + minutes : minutes;
        return `${hours}:${minutes} ${ampm}`;
    }

    let sessionTimer;
    window.startSession = () => {
        const now = Date.now();
        const sessionData = {
            startTime: now,
            endTime: now + (50 * 60 * 1000), // 50 دقيقة دراسة
            type: 'study'
        };
        localStorage.setItem('current_session', JSON.stringify(sessionData));
        runSessionLogic();
    };

    window.cancelSession = () => {
        if(confirm("متأكد تريد تلغي السشن الحالي وتكسر التركيز؟")) {
            localStorage.removeItem('current_session');
            document.getElementById('session-bar').style.background = "linear-gradient(135deg, var(--primary), var(--secondary))";
            document.getElementById('s-status').innerText = "لا يوجد سشن نشط";
            document.getElementById('s-start').innerText = "البداية: --:--";
            document.getElementById('s-rem').innerText = "المتبقي: --:--";
        }
    };

    function runSessionLogic() {
        clearInterval(sessionTimer);
        sessionTimer = setInterval(() => {
            const dataStr = localStorage.getItem('current_session');
            if(!dataStr) return;
            
            let data = JSON.parse(dataStr);
            const now = Date.now();
            const diff = data.endTime - now;

            const startFormatted = formatTimeObject(new Date(data.startTime));
            document.getElementById('s-start').innerText = `البداية: ${startFormatted}`;

            if(diff <= 0) {
                if(data.type === 'study') {
                    alert("بطل كملت 50 دقيقة! هسة خذلك ريست 10 دقايق.");
                    data = { startTime: now, endTime: now + (10 * 60 * 1000), type: 'break' };
                    localStorage.setItem('current_session', JSON.stringify(data));
                } else {
                    alert("انتهى وقت الراحة، اضغط بدء سشن للعودة للدراسة.");
                    localStorage.removeItem('current_session');
                    return cancelSession(); // إعادة تصفير الواجهة
                }
            }

            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('s-rem').innerText = `المتبقي: ${m}:${s < 10 ? '0':''}${s}`;

            if(data.type === 'study') {
                document.getElementById('s-status').innerText = "📝 وقت الإنجاز";
                document.getElementById('session-bar').style.background = "linear-gradient(135deg, #0f2027, #203a43, #2c5364)";
            } else {
                document.getElementById('s-status').innerText = "☕ وقت الراحة";
                document.getElementById('session-bar').style.background = "linear-gradient(135deg, #11998e, #38ef7d)";
            }
        }, 1000);
    }
    runSessionLogic();

    // --- نظام الروابط المخصصة ---
    function renderCustomLinks() {
        const links = JSON.parse(localStorage.getItem('custom_links')) || [];
        const container = document.getElementById('custom-links-container');
        container.innerHTML = '';
        links.forEach((link, index) => {
            container.innerHTML += `<a href="${link.url}" target="_blank" class="btn-pill link-pill" style="background: ${link.color}; position:relative;">
                ${link.name} 
                <span onclick="event.preventDefault(); deleteLink(${index})" style="margin-right:5px; font-size:10px; cursor:pointer;">❌</span>
            </a>`;
        });
    }

    window.addCustomLink = () => {
        const name = document.getElementById('new-link-name').value;
        const url = document.getElementById('new-link-url').value;
        const color = document.getElementById('new-link-color').value;
        if(!name || !url) return alert("يرجى إدخال الاسم والرابط");

        const links = JSON.parse(localStorage.getItem('custom_links')) || [];
        links.push({name, url, color});
        localStorage.setItem('custom_links', JSON.stringify(links));
        
        document.getElementById('link-modal').style.display='none';
        document.getElementById('new-link-name').value = '';
        document.getElementById('new-link-url').value = '';
        renderCustomLinks();
    };

    window.deleteLink = (index) => {
        const links = JSON.parse(localStorage.getItem('custom_links')) || [];
        links.splice(index, 1);
        localStorage.setItem('custom_links', JSON.stringify(links));
        renderCustomLinks();
    };
    renderCustomLinks();

    // --- نظام الدردشة المطور ---
    let activeId = 'study_main';
    function loadChans() {
        onValue(ref(db, 'chans_final'), (snap) => {
            const list = document.getElementById('chan-list');
            list.innerHTML = `<div class="btn-pill ${activeId==='study_main'?'active':''}" onclick="setChan('study_main')">📚 الرئيسية</div>`;
            snap.forEach(c => {
                const data = c.val();
                if(data.type === 'public' || data.owner === myUser?.id) {
                    const icon = data.type === 'private' ? '🔒' : '#';
                    list.innerHTML += `<div class="btn-pill ${activeId===c.key?'active':''}" onclick="setChan('${c.key}')">${icon} ${data.name} <i class="fas fa-trash" style="font-size:9px; margin-right:5px; color:#ff4b4b;" onclick="delChan(event, '${c.key}')"></i></div>`;
                }
            });
        });
    }

    window.setChan = (id) => { activeId = id; loadChans(); loadMsgs(); };
    window.openChanModal = () => document.getElementById('chan-modal').style.display = 'flex';
    
    window.addChannel = () => {
        const n = document.getElementById('new-chan-name').value;
        const type = document.getElementById('new-chan-type').value;
        if(!n || !myUser) return;
        push(ref(db, 'chans_final'), { name: n, type: type, owner: myUser.id });
        document.getElementById('new-chan-name').value = "";
        document.getElementById('chan-modal').style.display = 'none';
    };
    
    window.delChan = (e, id) => { 
        e.stopPropagation();
        if(confirm("حذف القناة نهائياً؟")) remove(ref(db, 'chans_final/'+id)); 
    };

    function loadMsgs() {
        onValue(ref(db, 'msgs_final/'+activeId), (snap) => {
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const isMe = myUser && m.uid === myUser.id;
                
                let body = m.type === 'text' ? `<div>${m.content}</div>` 
                         : m.type === 'img' ? `<img src="${m.content}" style="width:100%; border-radius:10px; margin-top:5px;">` 
                         : `<video src="${m.content}" controls style="width:100%; border-radius:10px; margin-top:5px;"></video>`;

                flow.innerHTML += `
                    <div class="msg-wrapper ${isMe?'me':'other'}">
                        <img src="${m.uimg}" class="u-avatar">
                        <div class="bubble">
                            <div class="msg-header">
                                <div>
                                    <span class="u-name">${m.uname}</span>
                                    <span class="u-phone">${m.phone || ''}</span>
                                </div>
                            </div>
                            ${body}
                            <span class="msg-time">${formatTimeObject(new Date(m.timestamp))}</span>
                        </div>
                    </div>
                `;
            });
            setTimeout(() => { flow.scrollTop = flow.scrollHeight; }, 50);
        });
    }

    document.getElementById('msg-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('send-btn').click();
    });

    document.getElementById('send-btn').onclick = () => {
        const txt = document.getElementById('msg-input').value;
        if(!txt || !myUser) return;
        push(ref(db, 'msgs_final/'+activeId), {
            uid: myUser.id, uname: myUser.name, phone: myUser.phone, uimg: myUser.img,
            content: txt, type: 'text', timestamp: Date.now()
        });
        document.getElementById('msg-input').value = "";
    };

    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if(!file || !myUser) return;
        const reader = new FileReader();
        const type = file.type.startsWith('image') ? 'img' : 'vid';
        reader.onload = (ev) => {
            push(ref(db, 'msgs_final/'+activeId), {
                uid: myUser.id, uname: myUser.name, phone: myUser.phone, uimg: myUser.img,
                content: ev.target.result, type, timestamp: Date.now()
            });
        };
        reader.readAsDataURL(file);
    };

    window.toggleTheme = () => {
        const b = document.body;
        const current = b.getAttribute('data-theme');
        b.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
        document.getElementById('theme-icon').className = current === 'light' ? 'fas fa-sun' : 'fas fa-moon';
    };

    loadChans(); loadMsgs();
</script>
</body>
</html>
