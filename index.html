<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>قتالات | Qatalat PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        :root {
            --primary: #00f2ff; --accent: #7000ff; --bg: #0a0b10;
            --glass: rgba(25, 28, 35, 0.9); --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: #fff; 
            height: 100dvh; overflow: hidden; /* dvh لتجنب مشاكل المتصفحات الجوالة */
        }

        /* شريط السشنات المتحرك */
        #session-ticker {
            background: linear-gradient(90deg, #7000ff, #00f2ff);
            color: #000; font-weight: bold; padding: 5px 0;
            font-size: 13px; position: fixed; top: 0; width: 100%; z-index: 2000;
        }

        /* واجهة التطبيق */
        .app-container {
            display: flex; flex-direction: column; height: 100dvh;
            padding-top: 28px; /* مساحة شريط السشنات */
        }

        header {
            padding: 15px; background: var(--glass);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .view-section {
            flex: 1; overflow-y: auto; padding: 15px;
            display: none; scroll-behavior: smooth;
        }
        .view-section.active { display: block; }

        /* الشات ونظام الفقاعات */
        .msg-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: flex-end; }
        .msg-row.me { flex-direction: row-reverse; }
        
        .u-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--primary); object-fit: cover; }
        
        .bubble {
            max-width: 75%; padding: 10px 15px; border-radius: 18px;
            background: #1e2129; position: relative; font-size: 15px;
            border: 1px solid var(--border); line-height: 1.4;
        }
        .me .bubble { background: var(--accent); border: none; border-bottom-right-radius: 2px; }
        .other .bubble { border-bottom-left-radius: 2px; }

        .u-name { font-size: 11px; color: var(--primary); display: block; margin-bottom: 4px; }

        /* منطقة الإرسال - تم إصلاح مشكلة الاختفاء */
        .input-bar {
            background: #16181d; padding: 12px;
            display: flex; gap: 10px; align-items: center;
            border-top: 1px solid var(--border);
        }
        .input-bar input {
            flex: 1; background: #000; border: 1px solid #333;
            padding: 12px; border-radius: 25px; color: #fff; outline: none;
        }

        /* القائمة السفلية */
        nav {
            display: flex; justify-content: space-around; background: #000;
            padding: 10px 0; border-top: 1px solid var(--border);
        }
        .nav-btn { text-align: center; color: #666; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--primary); transform: translateY(-3px); }
        .nav-btn i { font-size: 20px; display: block; margin-bottom: 2px; }

        /* شاشة الحماية واللوجن */
        .full-overlay {
            position: fixed; inset: 0; background: #000; z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }

        /* ميديا */
        .msg-media { width: 100%; border-radius: 10px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="session-ticker">
    <marquee id="ticker-text">جاري تحميل السشنات...</marquee>
</div>

<div id="guard-overlay" class="full-overlay">
    <i class="fas fa-shield-alt" style="font-size: 50px; color: var(--primary); margin-bottom: 20px;"></i>
    <h3>نظام قتالات الآمن</h3>
    <input type="password" id="gate-key" placeholder="ادخل الرمز السري" 
           style="background:#111; border:1px solid var(--primary); padding:15px; border-radius:10px; color:#fff; text-align:center; font-size:20px;">
</div>

<div id="profile-overlay" class="full-overlay" style="display: none;">
    <h3>إعداد الملف الشخصي</h3>
    <img id="p-prev" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--primary); object-fit: cover;">
    <input type="file" id="p-upload" hidden accept="image/*">
    <button onclick="document.getElementById('p-upload').click()" style="background:none; color:var(--primary); border:none; margin:10px; cursor:pointer;">تغيير الصورة</button>
    <input type="text" id="p-nick" placeholder="اسمك في القتال" style="width:80%; padding:12px; border-radius:8px; border:1px solid #333; background:#111; color:#fff;">
    <button onclick="saveMyProfile()" style="width:80%; padding:12px; background:var(--primary); border:none; border-radius:8px; margin-top:20px; font-weight:bold;">دخول المنصة</button>
</div>

<div class="app-container">
    <header>
        <span style="font-weight: bold; color: var(--primary);"><i class="fas fa-fire"></i> قتالات الرئيسية</span>
        <i class="fas fa-cog" onclick="localStorage.clear(); location.reload();"></i>
    </header>

    <div id="chat-view" class="view-section active">
        <div id="chat-flow"></div>
    </div>

    <div id="feed-view" class="view-section">
        <div id="feed-flow"></div>
    </div>

    <div class="input-bar">
        <i class="fas fa-camera" style="color:var(--primary); font-size:20px;" onclick="document.getElementById('file-in').click()"></i>
        <input type="file" id="file-in" hidden accept="image/*,video/*">
        <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا...">
        <i class="fas fa-paper-plane" id="send-trigger" style="color:var(--primary); font-size:20px;"></i>
    </div>

    <nav>
        <div class="nav-btn active" onclick="showView('chat', this)">
            <i class="fas fa-comment-dots"></i> الشات
        </div>
        <div class="nav-btn" onclick="showView('feed', this)">
            <i class="fas fa-stream"></i> المنشورات
        </div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLtjHJIMkLE3CE_WZSDpWQTx_cpTcpycM",
        authDomain: "studyproject-1466b.firebaseapp.com",
        projectId: "studyproject-1466b",
        storageBucket: "studyproject-1466b.firebasestorage.app",
        messagingSenderId: "589724771483",
        appId: "1:589724771483:web:1c53636da586d2c787923e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myUser = JSON.parse(localStorage.getItem('user_qatalat_v1'));

    // --- نظام الحماية واللوجن ---
    document.getElementById('gate-key').oninput = (e) => {
        if(e.target.value === '166277399') {
            document.getElementById('guard-overlay').style.display = 'none';
            if(!myUser) document.getElementById('profile-overlay').style.display = 'flex';
        }
    };

    window.saveMyProfile = () => {
        const name = document.getElementById('p-nick').value;
        const img = document.getElementById('p-prev').src;
        if(!name) return alert("اكتب اسمك أولاً");
        myUser = { id: 'u'+Date.now(), name, img };
        localStorage.setItem('user_qatalat_v1', JSON.stringify(myUser));
        document.getElementById('profile-overlay').style.display = 'none';
        location.reload();
    };

    document.getElementById('p-upload').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => document.getElementById('p-prev').src = ev.target.result;
        r.readAsDataURL(e.target.files[0]);
    };

    // --- نظام السشنات الذكي ---
    const sessions = [
        {h:6, m:0, txt:"السشن 1: انطلاق القوة ⚡"}, {h:8, m:0, txt:"استراحة المحارب ☕"},
        {h:8, m:15, txt:"السشن 2: التركيز العميق 🧠"}, {h:10, m:15, txt:"استراحة قصيرة ✨"},
        {h:10, m:30, txt:"السشن 3: سحق المهام 🔥"}, {h:12, m:0, txt:"وقت الغداء والراحة 🍲"},
        {h:13, m:0, txt:"السشن 4: استمرارية العطاء 🚀"}, {h:15, m:0, txt:"استراحة المساء 🌅"},
        {h:15, m:15, txt:"السشن 5: اللمسات الأخيرة ✨"}, {h:17, m:30, txt:"سشن المراجعة والختام ✅"}
    ];

    function updateTicker() {
        const now = new Date();
        const curMin = now.getHours() * 60 + now.getMinutes();
        let current = "لا يوجد سشن حالياً.. استعد!";
        
        for(let i=0; i<sessions.length; i++) {
            const sMin = sessions[i].h * 60 + sessions[i].m;
            if(curMin >= sMin) current = `الحالة الآن: ${sessions[i].txt}`;
        }
        document.getElementById('ticker-text').innerText = ` | ${current} | الساعة الآن: ${now.toLocaleTimeString('ar-EG')} | قتالات مستمرة...`;
    }
    setInterval(updateTicker, 1000);

    // --- تبديل الشاشات ---
    window.showView = (view, btn) => {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(view+'-view').classList.add('active');
        btn.classList.add('active');
    };

    // --- إرسال الرسائل (قتالات) ---
    const sendMsg = () => {
        const txt = document.getElementById('msg-input').value;
        if(!txt || !myUser) return;
        
        const path = document.getElementById('chat-view').classList.contains('active') ? 'main_chat' : 'feed';
        
        push(ref(db, path), {
            uid: myUser.id, u: myUser.name, p: myUser.img,
            msg: txt, type: 'text', time: serverTimestamp()
        });
        document.getElementById('msg-input').value = "";
    };

    document.getElementById('send-trigger').onclick = sendMsg;
    document.getElementById('msg-input').onkeypress = (e) => { if(e.key==='Enter') sendMsg(); };

    // ميديا الشات
    document.getElementById('file-in').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        const type = file.type.startsWith('image') ? 'img' : 'vid';
        reader.onload = (ev) => {
            push(ref(db, 'main_chat'), {
                uid: myUser.id, u: myUser.name, p: myUser.img,
                media: ev.target.result, type, time: serverTimestamp()
            });
        };
        reader.readAsDataURL(file);
    };

    // --- استقبال البيانات (تحسين الأداء) ---
    onValue(ref(db, 'main_chat'), (snap) => {
        const flow = document.getElementById('chat-flow');
        flow.innerHTML = "";
        snap.forEach(child => {
            const d = child.val();
            const isMe = d.uid === myUser?.id;
            let content = d.type === 'text' ? d.msg : 
                         (d.type === 'img' ? `<img src="${d.media}" class="msg-media">` : `<video src="${d.media}" controls class="msg-media"></video>`);
            
            flow.innerHTML += `
                <div class="msg-row ${isMe ? 'me' : 'other'}">
                    <img src="${d.p}" class="u-avatar">
                    <div class="bubble">
                        <span class="u-name">${d.u}</span>
                        ${content}
                    </div>
                </div>
            `;
        });
        document.getElementById('chat-view').scrollTo(0, flow.scrollHeight);
    });

    onValue(ref(db, 'feed'), (snap) => {
        const flow = document.getElementById('feed-flow');
        flow.innerHTML = "";
        let posts = [];
        snap.forEach(c => posts.unshift(c.val()));
        posts.forEach(p => {
            flow.innerHTML += `
                <div style="background:#1e2129; padding:15px; border-radius:15px; margin-bottom:15px; border:1px solid #333;">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                        <img src="${p.p}" style="width:40px; height:40px; border-radius:50%;">
                        <b style="color:var(--primary)">${p.u}</b>
                    </div>
                    <p>${p.msg}</p>
                </div>
            `;
        });
    });

</script>
</body>
</html>
