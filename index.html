<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AM ros V5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        :root {
            --primary: #00f2ff; --accent: #7000ff; --bg: #050508; --card: rgba(20, 22, 30, 0.9);
            --sidebar-width: 260px;
        }

        body, html {
            margin: 0; padding: 0; font-family: 'Tajawal', sans-serif;
            background: var(--bg); color: #fff; height: 100%; overflow: hidden;
        }

        #atom-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* الشريط العلوي */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(10, 11, 16, 0.9); backdrop-filter: blur(15px);
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0, 242, 255, 0.2); z-index: 1000;
        }

        .menu-btn { color: var(--primary); font-size: 22px; cursor: pointer; transition: 0.3s; }
        .menu-btn:hover { text-shadow: 0 0 10px var(--primary); }

        /* القائمة الجانبية */
        .sidebar {
            position: fixed; top: 0; right: -300px; width: var(--sidebar-width); height: 100%;
            background: var(--card); border-left: 1px solid rgba(112, 0, 255, 0.3);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2000; padding: 20px;
            display: flex; flex-direction: column; backdrop-filter: blur(20px);
        }
        .sidebar.active { right: 0; }
        
        .channel-list { flex: 1; overflow-y: auto; margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
        .channel-item {
            padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px;
            cursor: pointer; transition: 0.3s; border: 1px solid transparent;
            display: flex; justify-content: space-between; align-items: center;
        }
        .channel-item:hover, .channel-item.active {
            background: rgba(0, 242, 255, 0.1); border-color: var(--primary);
        }
        .del-channel-btn { color: #ff4d4d; opacity: 0.6; transition: 0.3s; padding: 5px; }
        .del-channel-btn:hover { opacity: 1; transform: scale(1.2); }

        /* الشات والرسائل */
        .chat-area {
            flex: 1; overflow-y: auto; padding: 140px 15px 90px 15px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .msg { max-width: 85%; align-self: flex-start; animation: slideIn 0.3s ease; }
        .msg.me { align-self: flex-end; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        
        .msg-bubble {
            background: rgba(35, 38, 48, 0.8); padding: 12px 16px; border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.05); position: relative;
        }
        .me .msg-bubble { background: linear-gradient(135deg, var(--accent), #4a00e0); border: none; box-shadow: 0 4px 15px rgba(112,0,255,0.3); }

        .user-info { font-size: 11px; color: var(--primary); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .avatar { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--primary); object-fit: cover; }

        /* الإدخال */
        .input-box {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10, 11, 16, 0.95); padding: 15px;
            display: flex; gap: 12px; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }

        #msg-in {
            flex: 1; background: #000; border: 1px solid #333;
            padding: 12px 18px; border-radius: 25px; color: #fff; outline: none;
        }

        /* المودالات */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 5000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .modal {
            background: var(--card); padding: 25px; border-radius: 20px; width: 85%; max-width: 320px;
            border: 1px solid var(--primary); text-align: center;
        }

        #floating-status {
            position: fixed; top: 70px; left: 15px; right: 15px;
            background: rgba(112, 0, 255, 0.2); backdrop-filter: blur(5px);
            padding: 10px; border-radius: 12px; text-align: center;
            border: 1px solid rgba(0, 242, 255, 0.3); z-index: 900;
        }
    </style>
</head>
<body>

<canvas id="atom-canvas"></canvas>

<div class="top-bar">
    <i class="fas fa-th-large menu-btn" onclick="toggleSidebar()"></i>
    <div id="current-channel-title" style="font-weight: bold; color: var(--primary);">الرئيسية 🔮</div>
    <div style="width: 22px;"></div>
</div>

<div class="sidebar" id="sidebar">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h3 style="margin:0; color:var(--primary);">القنوات 🧬</h3>
        <i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer; color:#ff4d4d;"></i>
    </div>
    <div class="channel-list" id="channels-container"></div>
    <button onclick="showNewChannelModal()" style="background:var(--accent); color:#fff; border:none; padding:12px; border-radius:10px; margin-top:15px; cursor:pointer; font-weight:bold;">
        + إنشاء قناة جديدة
    </button>
</div>

<div class="app-container">
    <div id="floating-status">
        <div id="status-text" style="font-size: 13px;">جاري المزامنة...</div>
        <div id="countdown-text" style="font-size: 15px; font-weight: bold; color: var(--primary);">00:00</div>
    </div>

    <div class="chat-area" id="chat-box"></div>
    
    <div class="input-box">
        <i class="fas fa-image icon-btn" onclick="document.getElementById('file-in').click()" style="color:var(--primary); cursor:pointer; font-size:22px;"></i>
        <input type="file" id="file-in" hidden accept="image/*,video/*" onchange="uploadFile(this)">
        <input type="text" id="msg-in" placeholder="اكتب شيئاً مذهلاً..." onkeypress="if(event.key==='Enter') sendMsg()">
        <i class="fas fa-paper-plane" onclick="sendMsg()" style="color:var(--accent); cursor:pointer; font-size:22px;"></i>
    </div>
</div>

<div id="login-overlay" class="overlay" style="display: none;">
    <div class="modal">
        <h3 style="color:var(--primary)">مرحباً بك 🌌</h3>
        <img id="p-preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--primary); object-fit:cover; cursor:pointer;" onclick="document.getElementById('p-file').click()">
        <input type="file" id="p-file" hidden onchange="previewProfile(this)">
        <input type="text" id="p-name" placeholder="ما هو لقبك؟" style="width:90%; padding:10px; margin:15px 0; border-radius:8px; border:1px solid #444; background:#000; color:#fff;">
        <button onclick="saveProfile()" style="width:100%; padding:10px; background:var(--primary); border:none; border-radius:8px; font-weight:bold;">دخول</button>
    </div>
</div>

<div id="new-channel-overlay" class="overlay">
    <div class="modal">
        <h3 style="color:var(--primary)">إنشاء قناة 💠</h3>
        <input type="text" id="channel-name-in" placeholder="اسم القناة..." style="width:90%; padding:10px; margin:15px 0; border-radius:8px; border:1px solid #444; background:#000; color:#fff;">
        <button onclick="createNewChannel()" style="width:100%; padding:10px; background:var(--primary); border:none; border-radius:8px; font-weight:bold;">تأكيد</button>
        <button onclick="document.getElementById('new-channel-overlay').style.display='none'" style="width:100%; padding:10px; background:none; color:#fff; border:none; margin-top:5px;">إلغاء</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLtjHJIMkLE3CE_WZSDpWQTx_cpTcpycM",
        authDomain: "studyproject-1466b.firebaseapp.com",
        projectId: "studyproject-1466b",
        storageBucket: "studyproject-1466b.firebasestorage.app",
        messagingSenderId: "589724771483",
        appId: "1:589724771483:web:1c53636da586d2c787923e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- الأنيميشن (الذرات) ---
    const canvas = document.getElementById('atom-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, atoms = [];
    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    class Atom {
        constructor() { this.reset(); }
        reset() { this.x = Math.random()*w; this.y = Math.random()*h; this.vx = (Math.random()-0.5)*1.2; this.vy = (Math.random()-0.5)*1.2; this.r = Math.random()*2+1; }
        update() { 
            this.x+=this.vx; this.y+=this.vy; 
            if(this.x<0||this.x>w) this.vx*=-1; if(this.y<0||this.y>h) this.vy*=-1; 
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
            ctx.fillStyle = "#00f2ff"; ctx.fill();
        }
    }
    for(let i=0; i<40; i++) atoms.push(new Atom());
    function anim() {
        ctx.fillStyle = "rgba(5,5,8,0.2)"; ctx.fillRect(0,0,w,h);
        atoms.forEach(a => { a.update(); a.draw(); });
        requestAnimationFrame(anim);
    }
    anim();

    // --- نظام المستخدم ---
    let myUser = JSON.parse(localStorage.getItem('enjaz_user_v5'));
    if(!myUser) document.getElementById('login-overlay').style.display = 'flex';

    window.previewProfile = (i) => { const r=new FileReader(); r.onload=(e)=>document.getElementById('p-preview').src=e.target.result; r.readAsDataURL(i.files[0]); };
    window.saveProfile = () => {
        const n = document.getElementById('p-name').value;
        const p = document.getElementById('p-preview').src;
        if(!n) return;
        myUser = { n, p, id: Date.now() };
        localStorage.setItem('enjaz_user_v5', JSON.stringify(myUser));
        location.reload();
    };

    // --- نظام القنوات (مع الحذف) ---
    let currentChannelId = 'main_channel';
    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('active');
    window.showNewChannelModal = () => { document.getElementById('new-channel-overlay').style.display='flex'; toggleSidebar(); };

    window.createNewChannel = () => {
        const name = document.getElementById('channel-name-in').value;
        if(!name) return;
        const id = 'ch_' + Date.now();
        set(ref(db, `enjaz_channels/${id}`), { name: name });
        document.getElementById('new-channel-overlay').style.display='none';
        switchChannel(id, name);
    };

    window.deleteChannel = (id, name) => {
        if(confirm(`هل تود مسح قناة [${name}]؟`)) {
            remove(ref(db, `enjaz_channels/${id}`));
            remove(ref(db, `enjaz_messages/${id}`));
            if(currentChannelId === id) switchChannel('main_channel', 'الرئيسية 🔮');
        }
    };

    window.switchChannel = (id, name) => {
        currentChannelId = id;
        document.getElementById('current-channel-title').innerText = name;
        document.getElementById('sidebar').classList.remove('active');
        loadMessages();
    };

    onValue(ref(db, 'enjaz_channels'), (snap) => {
        const cont = document.getElementById('channels-container');
        cont.innerHTML = `<div class="channel-item ${currentChannelId==='main_channel'?'active':''}" onclick="switchChannel('main_channel','الرئيسية 🔮')"><span>الرئيسية 🔮</span></div>`;
        snap.forEach(child => {
            const c = child.val(); const k = child.key;
            cont.innerHTML += `
                <div class="channel-item ${currentChannelId===k?'active':''}" onclick="switchChannel('${k}','${c.name}')">
                    <span>${c.name}</span>
                    <i class="fas fa-trash-alt del-channel-btn" onclick="event.stopPropagation(); deleteChannel('${k}','${c.name}')"></i>
                </div>`;
        });
    });

    // --- نظام السشنات 24 ساعة ---
    const schedule = [];
    for(let i=0; i<12; i++) {
        let studyStart = i * 135; // 24 ساعة مقسمة لسشنات
        schedule.push({ n: `سشن ${i+1} 🧬`, start: studyStart, end: studyStart+120 });
        schedule.push({ n: `استراحة ☕`, start: studyStart+120, end: studyStart+135 });
    }

    function updateClock() {
        const now = new Date();
        const mins = now.getHours()*60 + now.getMinutes();
        let active = schedule.find(s => mins >= s.start && mins < s.end);
        if(active) {
            document.getElementById('status-text').innerText = active.n;
            document.getElementById('countdown-text').innerText = `باقي ${active.end - mins} دقيقة`;
        }
    }
    setInterval(updateClock, 1000); updateClock();

    // --- الشات والوسائط ---
    let msgListener = null;
    function loadMessages() {
        const box = document.getElementById('chat-box');
        if(msgListener) msgListener();
        msgListener = onValue(ref(db, `enjaz_messages/${currentChannelId}`), (snap) => {
            box.innerHTML = "";
            snap.forEach(c => {
                const d = c.val(); const k = c.key; const isMe = d.uid === myUser.id;
                let content = d.type === 'text' ? d.txt : (d.type==='img' ? `<img src="${d.media}" style="width:100%; border-radius:10px;">` : `<video src="${d.media}" controls style="width:100%; border-radius:10px;"></video>`);
                box.innerHTML += `
                    <div class="msg ${isMe?'me':''}">
                        <div class="user-info">
                            <img src="${d.p}" class="avatar"> <b>${d.u}</b>
                            ${isMe ? `<i class="fas fa-trash" style="margin-right:10px; cursor:pointer;" onclick="deleteMsg('${k}')"></i>` : ''}
                        </div>
                        <div class="msg-bubble">${content}</div>
                    </div>`;
            });
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        });
    }

    window.sendMsg = () => {
        const input = document.getElementById('msg-in'); if(!input.value.trim()) return;
        push(ref(db, `enjaz_messages/${currentChannelId}`), { uid: myUser.id, u: myUser.n, p: myUser.p, txt: input.value, type: 'text', time: serverTimestamp() });
        input.value = "";
    };

    window.uploadFile = (input) => {
        if(!input.files[0]) return;
        const reader = new FileReader();
        const type = input.files[0].type.startsWith('image') ? 'img' : 'vid';
        reader.onload = (e) => {
            push(ref(db, `enjaz_messages/${currentChannelId}`), { uid: myUser.id, u: myUser.n, p: myUser.p, media: e.target.result, type, time: serverTimestamp() });
        };
        reader.readAsDataURL(input.files[0]);
        input.value = "";
    };

    window.deleteMsg = (k) => { if(confirm("حذف الرسالة؟")) remove(ref(db, `enjaz_messages/${currentChannelId}/${k}`)); };

    if(myUser) loadMessages();
</script>
</body>
</html>
