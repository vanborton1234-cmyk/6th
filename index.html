<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AM ros v5 | إنجازاتي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        :root {
            --primary: #00d2ff;
            --secondary: #9d50bb;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1e293b;
            --border: rgba(0,0,0,0.08);
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; font-family: 'Tajawal', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

        /* شريط السشنات العلوي */
        .top-session-bar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; padding: 12px 10px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative; border-bottom: 2px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        .session-main-info { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .session-main-info b { font-size: 15px; }
        .session-main-info span { font-size: 13px; font-weight: bold; background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 10px; }
        .session-time-range { font-size: 12px; opacity: 0.9; background: rgba(255,255,255,0.15); padding: 3px 12px; border-radius: 12px; }
        
        /* حركة الإيموجي التحفيزي */
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .animated-emoji { display: inline-block; animation: bounce 1s infinite; font-size: 20px; }

        /* شاشة الحماية */
        #gate-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .app-shell { 
            display: flex; flex-direction: column; height: calc(100dvh - 65px); /* تم التعديل ليناسب حجم شريط السشنات الجديد */
            max-width: 600px; margin: 0 auto; background: var(--card); box-shadow: var(--shadow);
        }

        header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        .channels-bar { display: flex; gap: 8px; padding: 10px 15px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .chan-btn { padding: 6px 14px; border-radius: 18px; background: var(--bg); border: 1px solid var(--border); color: var(--text); cursor: pointer; white-space: nowrap; font-size: 13px; }
        .chan-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .chat-area { flex: 1; overflow-y: auto; padding: 15px; background: var(--bg); display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }

        /* الرسائل مع الأفاتار */
        .msg-wrapper { display: flex; gap: 10px; max-width: 95%; align-items: flex-end; }
        .msg-wrapper.me { align-self: flex-end; flex-direction: row-reverse; }
        
        .u-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); flex-shrink: 0; }
        
        .bubble { 
            background: var(--card); padding: 10px 15px; border-radius: 18px; 
            border: 1px solid var(--border); position: relative; color: var(--text);
            font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); min-width: 150px;
        }
        .me .bubble { background: var(--primary); color: white; border: none; border-bottom-right-radius: 4px; }
        .other .bubble { border-bottom-left-radius: 4px; }

        /* رأس الرسالة (الاسم والخيارات) */
        .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .u-name { font-size: 11px; font-weight: bold; opacity: 0.9; }
        .msg-time { font-size: 10px; opacity: 0.7; display: block; text-align: left; margin-top: 5px; }
        
        /* قائمة إعدادات الرسالة */
        .msg-options { position: relative; cursor: pointer; padding: 0 5px; }
        .msg-menu { 
            display: none; position: absolute; left: 0; top: 100%; background: var(--card); 
            border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow); 
            z-index: 100; min-width: 120px; overflow: hidden;
        }
        .msg-menu.show { display: block; }
        .msg-menu div { padding: 8px 12px; font-size: 12px; color: var(--text); border-bottom: 1px solid var(--border); text-align: right; }
        .msg-menu div:hover { background: var(--bg); }
        .msg-menu div.danger { color: #ff4b4b; }

        .input-bar { padding: 12px 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid var(--border); background: var(--card); }
        .input-bar input[type="text"] { flex: 1; padding: 12px 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; font-size: 14px; }

        .icon-btn { font-size: 20px; color: var(--primary); cursor: pointer; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 5000; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; }
        
        select.styled-select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; outline: none; background: var(--bg); color: var(--text); }
    </style>
</head>
<body data-theme="light">

<div class="top-session-bar" id="session-bar">
    <div class="session-main-info">
        <div class="animated-emoji" id="session-emoji">🔥</div>
        <b id="session-text">فحص الدورة...</b>
        <span id="session-time">--</span>
    </div>
    <div class="session-time-range" id="session-range">من -- إلى --</div>
</div>

<div id="gate-overlay">
    <h2 style="color: var(--primary);">AM ros v5</h2>
    <p>أدخل رمز الدخول</p>
    <input type="password" id="gate-pass" placeholder="••••••••" style="padding:15px; border-radius:12px; border:2px solid var(--primary); text-align:center; font-size:20px; width:200px; outline:none;">
</div>

<div class="app-shell">
    <header>
        <div onclick="toggleTheme()" style="cursor:pointer;"><i id="theme-icon" class="fas fa-moon"></i></div>
        <b style="color: var(--primary); font-size: 18px;">AM ros v5</b>
        <i class="fas fa-plus-circle icon-btn" onclick="openChanModal()"></i>
    </header>

    <div class="channels-bar" id="chan-list"></div>

    <main class="chat-area" id="chat-flow" onclick="closeAllMenus()"></main>

    <div class="input-bar">
        <i class="fas fa-camera icon-btn" onclick="document.getElementById('file-input').click()"></i>
        <input type="file" id="file-input" hidden accept="image/*,video/*">
        <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا...">
        <i class="fas fa-paper-plane icon-btn" id="send-btn"></i>
    </div>
</div>

<div id="profile-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>أهلاً بك في AM ros v5!</h3>
        <p>اختر صورتك واسمك للبدء</p>
        <img id="p-img-prev" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--primary); object-fit:cover; cursor:pointer;">
        <input type="file" id="p-img-file" hidden accept="image/*">
        <input type="text" id="p-name-in" placeholder="اسمك المستعار" style="width:100%; padding:12px; margin:15px 0; border-radius:10px; border:1px solid var(--border); outline:none; background: var(--bg); color: var(--text);">
        <button onclick="finishProfile()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">دخول</button>
    </div>
</div>

<div id="chan-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>إنشاء قناة جديدة</h3>
        <input type="text" id="new-chan-name" placeholder="اسم القناة" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); margin-bottom:10px; outline:none; background: var(--bg); color: var(--text);">
        
        <select id="new-chan-type" class="styled-select">
            <option value="public">🌐 قناة عامة (تظهر للجميع)</option>
            <option value="private">🔒 قناة خاصة (تظهر لي فقط)</option>
        </select>

        <button onclick="addChannel()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">إنشاء</button>
        <button onclick="closeChanModal()" style="margin-top:10px; background:none; border:none; color:#888; cursor:pointer;">إلغاء</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLtjHJIMkLE3CE_WZSDpWQTx_cpTcpycM",
        authDomain: "studyproject-1466b.firebaseapp.com",
        projectId: "studyproject-1466b",
        storageBucket: "studyproject-1466b.firebasestorage.app",
        messagingSenderId: "589724771483",
        appId: "1:589724771483:web:1c53636da586d2c787923e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myUser = JSON.parse(localStorage.getItem('enjaz_user_final'));
    const isVerified = localStorage.getItem('gate_ok') === 'true';

    if(isVerified) {
        document.getElementById('gate-overlay').style.display = 'none';
        if(!myUser) document.getElementById('profile-modal').style.display = 'flex';
    }

    document.getElementById('gate-pass').oninput = (e) => {
        if(e.target.value === '166277399') {
            localStorage.setItem('gate_ok', 'true');
            document.getElementById('gate-overlay').style.display = 'none';
            if(!myUser) document.getElementById('profile-modal').style.display = 'flex';
        }
    };

    document.getElementById('p-img-prev').onclick = () => document.getElementById('p-img-file').click();
    document.getElementById('p-img-file').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => document.getElementById('p-img-prev').src = ev.target.result;
        r.readAsDataURL(e.target.files[0]);
    };

    window.finishProfile = () => {
        const name = document.getElementById('p-name-in').value;
        const img = document.getElementById('p-img-prev').src;
        if(!name) return;
        myUser = { id: 'u'+Date.now(), name, img };
        localStorage.setItem('enjaz_user_final', JSON.stringify(myUser));
        location.reload();
    };

    // دالة مساعدة لتحويل الوقت إلى نظام 12 ساعة لنستخدمها في السشنات
    function formatTimeObject(dateObj) {
        let hours = dateObj.getHours();
        let minutes = dateObj.getMinutes();
        const ampm = hours >= 12 ? 'م' : 'ص';
        hours = hours % 12;
        hours = hours ? hours : 12; 
        minutes = minutes < 10 ? '0' + minutes : minutes;
        return `${hours}:${minutes} ${ampm}`;
    }

    // نظام السشنات المطور (دقائق فقط + الوقت من إلى)
    function runSessions() {
        const now = new Date();
        const mins = now.getHours() * 60 + now.getMinutes();
        const cycle = 135; // 120 دقيقة دراسة + 15 استراحة
        const pos = mins % cycle;
        
        let startTime = new Date(now);
        let endTime = new Date(now);
        
        if(pos < 120) {
            // نحن في وقت الدراسة
            const rem = 120 - pos;
            
            // حساب وقت البداية والنهاية
            startTime.setMinutes(now.getMinutes() - pos);
            endTime.setMinutes(now.getMinutes() + rem);
            
            document.getElementById('session-emoji').innerText = "🚀";
            document.getElementById('session-text').innerText = "هيا هيا أكمل التحدي! وقت الإنجاز";
            document.getElementById('session-time').innerText = `${rem} دقيقة`;
            document.getElementById('session-bar').style.background = "linear-gradient(135deg, #00d2ff, #9d50bb)";
        } else {
            // نحن في وقت الاستراحة
            const rem = cycle - pos;
            const breakPassed = pos - 120; // كم دقيقة مرت من الاستراحة
            
            // حساب وقت البداية والنهاية
            startTime.setMinutes(now.getMinutes() - breakPassed);
            endTime.setMinutes(now.getMinutes() + rem);
            
            document.getElementById('session-emoji').innerText = "☕";
            document.getElementById('session-text').innerText = "استرح قليلاً لتعود أقوى";
            document.getElementById('session-time').innerText = `${rem} دقيقة`;
            document.getElementById('session-bar').style.background = "linear-gradient(135deg, #11998e, #38ef7d)";
        }
        
        // طباعة الوقت من وإلى
        document.getElementById('session-range').innerText = `من ${formatTimeObject(startTime)} إلى ${formatTimeObject(endTime)}`;
    }
    setInterval(runSessions, 1000); runSessions();

    // دالة تحويل الوقت لنظام 12 ساعة للرسائل
    function formatTime12h(timestamp) {
        if(!timestamp) return "";
        return formatTimeObject(new Date(timestamp));
    }

    let activeId = 'study_main';
    function loadChans() {
        onValue(ref(db, 'chans_final'), (snap) => {
            const list = document.getElementById('chan-list');
            list.innerHTML = `<div class="chan-btn ${activeId==='study_main'?'active':''}" onclick="setChan('study_main')">📚 الرئيسية</div>`;
            snap.forEach(c => {
                const data = c.val();
                if(data.type === 'public' || data.owner === myUser?.id) {
                    const icon = data.type === 'private' ? '🔒' : '#';
                    list.innerHTML += `<div class="chan-btn ${activeId===c.key?'active':''}" onclick="setChan('${c.key}')">${icon} ${data.name} <i class="fas fa-trash" style="font-size:9px; margin-right:5px;" onclick="delChan('${c.key}')"></i></div>`;
                }
            });
        });
    }

    window.setChan = (id) => { activeId = id; loadChans(); loadMsgs(); };
    window.openChanModal = () => document.getElementById('chan-modal').style.display = 'flex';
    window.closeChanModal = () => document.getElementById('chan-modal').style.display = 'none';
    
    window.addChannel = () => {
        const n = document.getElementById('new-chan-name').value;
        const type = document.getElementById('new-chan-type').value;
        if(!n || !myUser) return;
        
        push(ref(db, 'chans_final'), { 
            name: n, 
            type: type, 
            owner: myUser.id 
        });
        
        document.getElementById('new-chan-name').value = "";
        closeChanModal();
    };
    
    window.delChan = (id) => { 
        event.stopPropagation();
        if(confirm("هل أنت متأكد من حذف هذه القناة نهائياً؟")) remove(ref(db, 'chans_final/'+id)); 
    };

    function loadMsgs() {
        onValue(ref(db, 'msgs_final/'+activeId), (snap) => {
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const isMe = myUser && m.uid === myUser.id;
                
                let body = "";
                if(m.type === 'text') {
                    body = `<div>${m.content}</div>`;
                } else if(m.type === 'img') {
                    body = `<img src="${m.content}" style="width:100%; border-radius:10px; margin-top:5px;">`;
                } else if(m.type === 'vid') {
                    body = `<video src="${m.content}" controls style="width:100%; border-radius:10px; margin-top:5px;"></video>`;
                }
                
                const optionsMenu = `
                    <div class="msg-options" onclick="toggleMenu(event, '${child.key}')">
                        <i class="fas fa-ellipsis-v"></i>
                        <div class="msg-menu" id="menu-${child.key}">
                            ${m.type === 'text' ? `<div onclick="editMsg(event, '${child.key}', '${m.content.replace(/'/g, "\\'")}')">✏️ تعديل</div>` : ''}
                            <div class="danger" onclick="delMsg(event, '${child.key}')">🗑️ حذف للجميع</div>
                        </div>
                    </div>
                `;

                flow.innerHTML += `
                    <div class="msg-wrapper ${isMe?'me':'other'}">
                        <img src="${m.uimg}" class="u-avatar">
                        <div class="bubble">
                            <div class="msg-header">
                                <span class="u-name">${m.uname}</span>
                                ${optionsMenu}
                            </div>
                            ${body}
                            <span class="msg-time">${formatTime12h(m.timestamp)}</span>
                        </div>
                    </div>
                `;
            });
            setTimeout(() => { flow.scrollTop = flow.scrollHeight; }, 100);
        });
    }

    window.toggleMenu = (e, id) => {
        e.stopPropagation();
        closeAllMenus();
        document.getElementById(`menu-${id}`).classList.toggle('show');
    };

    window.closeAllMenus = () => {
        document.querySelectorAll('.msg-menu').forEach(menu => menu.classList.remove('show'));
    };

    window.editMsg = (e, id, oldContent) => {
        e.stopPropagation();
        closeAllMenus();
        const newText = prompt("تعديل الرسالة:", oldContent);
        if(newText && newText.trim() !== "" && newText !== oldContent) {
            update(ref(db, `msgs_final/${activeId}/${id}`), { content: newText });
        }
    };

    window.delMsg = (e, id) => { 
        e.stopPropagation();
        closeAllMenus();
        if(confirm("هل أنت متأكد من حذف هذه الرسالة للجميع؟")) {
            remove(ref(db, `msgs_final/${activeId}/${id}`)); 
        }
    };

    document.getElementById('msg-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') document.getElementById('send-btn').click();
    });

    document.getElementById('send-btn').onclick = () => {
        const txt = document.getElementById('msg-input').value;
        if(!txt || !myUser) return;
        push(ref(db, 'msgs_final/'+activeId), {
            uid: myUser.id, uname: myUser.name, uimg: myUser.img,
            content: txt, type: 'text', timestamp: Date.now()
        });
        document.getElementById('msg-input').value = "";
    };

    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if(!file || !myUser) return;
        const reader = new FileReader();
        const type = file.type.startsWith('image') ? 'img' : 'vid';
        reader.onload = (ev) => {
            push(ref(db, 'msgs_final/'+activeId), {
                uid: myUser.id, uname: myUser.name, uimg: myUser.img,
                content: ev.target.result, type, timestamp: Date.now()
            });
        };
        reader.readAsDataURL(file);
    };

    window.toggleTheme = () => {
        const b = document.body;
        const current = b.getAttribute('data-theme');
        b.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
        document.getElementById('theme-icon').className = current === 'light' ? 'fas fa-sun' : 'fas fa-moon';
    };

    loadChans(); loadMsgs();
</script>
</body>
</html>
