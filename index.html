<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إنجازاتي | الحماية القصوى</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        :root { --primary: #00f2ff; --accent: #7000ff; --bg: #05060a; --danger: #ff3333; }
        body, html { margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }
        
        #canvas-bg { position: fixed; inset: 0; z-index: -1; }
        #eagle-bg { position: fixed; inset: 0; z-index: -1; display: none; background: url('https://w0.peakpx.com/wallpaper/559/550/HD-wallpaper-blue-eagle-digital-art-birds-eagle-blue-animal.jpg') no-repeat center; background-size: cover; opacity: 0.2; }

        /* إشعار البث المباشر النابض */
        #live-notifier {
            display: none; background: var(--danger); color: white; text-align: center;
            padding: 8px; font-weight: bold; cursor: pointer; animation: pulse 1.5s infinite;
            position: fixed; top: 100px; left: 0; right: 0; z-index: 1500; font-size: 13px;
        }
        @keyframes pulse { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        #status-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(15, 15, 25, 0.98); padding: 10px; border-bottom: 1px solid var(--primary); text-align: center; }
        .chat-container { display: flex; flex-direction: column; height: 100vh; padding-top: 110px; padding-bottom: 80px; box-sizing: border-box; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }

        .msg-wrapper { display: flex; gap: 10px; max-width: 85%; align-items: flex-start; }
        .msg-wrapper.me { flex-direction: row-reverse; align-self: flex-end; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid var(--primary); object-fit: cover; }
        .msg-body { background: #1a1c25; padding: 10px 15px; border-radius: 15px; position: relative; border: 1px solid #333; }
        .me .msg-body { background: var(--accent); border: none; }
        .user-name { font-size: 11px; color: var(--primary); margin-bottom: 4px; display: block; font-weight: bold; }

        #live-overlay { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; }
        .input-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #111; padding: 15px; display: flex; gap: 10px; align-items: center; z-index: 1000; border-top: 1px solid #333; }
        .input-bar input { flex: 1; background: #000; border: 1px solid #444; padding: 12px; border-radius: 25px; color: #fff; outline: none; }
        .btn-icon { color: var(--primary); font-size: 24px; cursor: pointer; transition: 0.2s; }
        .btn-icon:active { transform: scale(0.9); }

        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>
<div id="eagle-bg"></div>

<div id="live-notifier" onclick="toggleLive(true)">🔴 يوجد بث مباشر حالياً - اضغط للانضمام</div>

<div id="login-screen">
    <div style="background:#1a1c25; padding:30px; border-radius:20px; text-align:center; border:1px solid var(--primary); width:80%; max-width:320px;">
        <h2 style="color:var(--primary)">دخول الطلاب ⚛️</h2>
        <img id="p-prev" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--primary); cursor:pointer;" onclick="document.getElementById('p-file').click()">
        <input type="file" id="p-file" hidden onchange="previewImg(this)">
        <input type="text" id="p-name" placeholder="اكتب اسمك الثلاثي" style="width:100%; padding:12px; margin:20px 0; border-radius:10px; border:1px solid #444; background:#000; color:#fff; text-align:center;">
        <button onclick="doSave()" style="width:100%; padding:12px; background:var(--primary); border:none; border-radius:10px; font-weight:bold; cursor:pointer;">دخول للمنصة</button>
    </div>
</div>

<div id="status-bar">
    <div id="sess-text" style="font-weight:bold; font-size:14px; color:#fff;">جاري المزامنة...</div>
    <div style="display:flex; justify-content:center; gap:25px; margin-top:10px;">
        <i class="fas fa-atom btn-icon" title="الثيم الذري" onclick="setTheme('atom')"></i>
        <i class="fas fa-feather-alt btn-icon" title="ثيم النسر" onclick="setTheme('eagle')"></i>
        <i class="fas fa-video btn-icon" style="color:var(--danger);" title="بدء بث مباشر" onclick="toggleLive(true)"></i>
    </div>
</div>

<div id="live-overlay">
    <div style="padding:10px; background:#111; display:flex; justify-content:space-between; align-items:center;">
        <span style="color:var(--danger); font-weight:bold;">🔴 بث آمن مشفر</span>
        <button onclick="toggleLive(false)" style="background:red; color:#fff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">إغلاق البث</button>
    </div>
    <iframe id="live-frame" src="" style="width:100%; height:calc(100% - 50px); border:none;" allow="camera; microphone; fullscreen; display-capture"></iframe>
</div>

<div class="chat-container">
    <div id="chat-box"></div>
</div>

<div class="input-bar">
    <i class="fas fa-camera btn-icon" onclick="document.getElementById('m-file').click()"></i>
    <input type="file" id="m-file" hidden accept="image/*,video/*" onchange="uploadMedia(this)">
    <input type="text" id="m-text" placeholder="اكتب إنجازك اليومي...">
    <i class="fas fa-paper-plane btn-icon" onclick="doSend()"></i>
</div>

<audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, serverTimestamp, set, onDisconnect } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLtjHJIMkLE3CE_WZSDpWQTx_cpTcpycM",
        authDomain: "studyproject-1466b.firebaseapp.com",
        projectId: "studyproject-1466b",
        databaseURL: "https://studyproject-1466b-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- إدارة المستخدم والبيانات ---
    let me = JSON.parse(localStorage.getItem('enjaz_secure_v5'));
    if(!me) document.getElementById('login-screen').style.display = 'flex';

    window.previewImg = (i) => { const r=new FileReader(); r.onload=(e)=>document.getElementById('p-prev').src=e.target.result; r.readAsDataURL(i.files[0]); };
    window.doSave = () => {
        const n = document.getElementById('p-name').value;
        const p = document.getElementById('p-prev').src;
        if(!n || n.length < 3) return alert("يرجى كتابة اسمك الحقيقي");
        me = { n, p, id: "U" + Math.floor(Math.random() * 1000000) };
        localStorage.setItem('enjaz_secure_v5', JSON.stringify(me));
        location.reload();
    };

    // --- نظام كاشف البث المباشر المطور ---
    const liveStatusRef = ref(db, 'live_signal');
    
    window.toggleLive = (show) => {
        const frame = document.getElementById('live-frame');
        const overlay = document.getElementById('live-overlay');
        overlay.style.display = show ? 'block' : 'none';
        
        // توليد اسم غرفة مشفر لا يمكن تخمينه
        const secretRoomID = "Enjaz_Secure_Room_778899_Iraq";
        
        if(show) {
            frame.src = `https://meet.jit.si/${secretRoomID}#config.startWithAudioMuted=true&config.prejoinPageEnabled=false`;
            set(liveStatusRef, { active: true, starter: me.n, time: Date.now() });
            // إذا انقطع الاتصال، يتم إغلاق إشارة البث تلقائياً
            onDisconnect(liveStatusRef).remove();
        } else {
            frame.src = "";
            remove(liveStatusRef);
        }
    };

    // الاستماع لوجود بث عند الآخرين
    onValue(liveStatusRef, (snap) => {
        const notifier = document.getElementById('live-notifier');
        if(snap.exists() && snap.val().active) {
            notifier.style.display = 'block';
            notifier.innerText = `🔴 بث مباشر بدأ بواسطة (${snap.val().starter}) - انضم الآن`;
        } else {
            notifier.style.display = 'none';
        }
    });

    // --- السشنات والجدول الزمني ---
    const schedule = [
        { n: "السشن الأول", h1: 6, m1: 0, h2: 8, m2: 0 },
        { n: "السشن الثاني", h1: 8, m1: 15, h2: 10, m2: 15 },
        { n: "السشن الثالث", h1: 10, m1: 30, h2: 12, m2: 0 },
        { n: "السشن الثالث (ب)", h1: 13, m1: 0, h2: 15, m2: 0 },
        { n: "السشن الرابع", h1: 15, m1: 15, h2: 17, m2: 15 },
        { n: "السشن الخامس", h1: 17, m1: 30, h2: 18, m2: 30 },
        { n: "السشن السادس", h1: 20, m1: 0, h2: 22, m2: 0 }
    ];

    function checkSess() {
        const now = new Date();
        const cur = now.getHours() * 60 + now.getMinutes();
        let active = schedule.find(s => cur >= (s.h1*60+s.m1) && cur < (s.h2*60+s.m2));
        const txt = document.getElementById('sess-text');
        if(active) {
            txt.innerHTML = `🌟 الآن: ${active.n} <small>(بقي ${ (active.h2*60+active.m2) - cur } دقيقة)</small>`;
        } else { txt.innerText = "وقت استراحة ودراسة حرة ☕"; }
    }
    setInterval(checkSess, 5000);

    // --- المراسلة والوسائط ---
    window.doSend = () => {
        const val = document.getElementById('m-text').value;
        if(!val) return;
        push(ref(db, 'messages_v5'), { uid: me.id, user: me.n, pic: me.p, msg: val, type: 'text', time: serverTimestamp() });
        document.getElementById('m-text').value = "";
    };

    window.uploadMedia = (i) => {
        const r = new FileReader();
        const type = i.files[0].type.startsWith('image') ? 'img' : 'vid';
        r.onload = (e) => {
            push(ref(db, 'messages_v5'), { uid: me.id, user: me.n, pic: me.p, media: e.target.result, type: type, time: serverTimestamp() });
        };
        r.readAsDataURL(i.files[0]);
    };

    onValue(ref(db, 'messages_v5'), (snap) => {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        snap.forEach(child => {
            const d = child.val();
            const isMe = d.uid === me.id;
            const content = d.type === 'text' ? d.msg : (d.type === 'img' ? `<img src="${d.media}" style="width:100%; border-radius:10px;">` : `<video src="${d.media}" controls style="width:100%; border-radius:10px;"></video>`);
            box.innerHTML += `
                <div class="msg-wrapper ${isMe ? 'me' : ''}">
                    <img src="${d.pic}" class="avatar">
                    <div class="msg-body">
                        <span class="user-name">${d.user}</span>
                        ${content}
                        <i class="fas fa-trash" style="font-size:10px; cursor:pointer; margin-right:10px; opacity:0.3;" onclick="remove(ref(db, 'messages_v5/${child.key}'))"></i>
                    </div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    });

    window.setTheme = (t) => {
        document.getElementById('canvas-bg').style.display = t==='atom'?'block':'none';
        document.getElementById('eagle-bg').style.display = t==='eagle'?'block':'none';
    };

    // ذرات الخلفية
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = [];
    class Particle { constructor() { this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.vx=Math.random()-0.5; this.vy=Math.random()-0.5; } update() { this.x+=this.vx; this.y+=this.vy; ctx.fillStyle="#00f2ff"; ctx.beginPath(); ctx.arc(this.x,this.y,1,0,Math.PI*2); ctx.fill(); } }
    for(let i=0;i<40;i++) particles.push(new Particle());
    function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>p.update()); requestAnimationFrame(animate); }
    animate();
</script>
</body>
</html>
