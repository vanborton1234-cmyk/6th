<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enjazati Pro | إنجازاتي المطور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap');

        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050508;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; font-family: 'Tajawal', sans-serif;
            background: var(--bg); color: #fff; height: 100vh; overflow: hidden;
        }

        /* خلفية سينمائية متحركة */
        #bg-canvas { position: fixed; inset: 0; z-index: -1; filter: blur(2px); }

        /* شاشة القفل (رمز الدخول) */
        #access-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
        }

        .input-access {
            background: #111; border: 2px solid var(--primary); padding: 15px;
            border-radius: 12px; color: var(--primary); text-align: center;
            font-size: 24px; letter-spacing: 5px; outline: none; width: 250px;
        }

        /* التصميم الرئيسي 3D */
        .app-shell {
            display: flex; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto;
            perspective: 1000px;
        }

        /* الهيدر العلوي */
        header {
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 15px; border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; transform: translateZ(20px);
        }

        /* نافذة المحتوى */
        main {
            flex: 1; overflow-y: auto; padding: 20px;
            scroll-behavior: smooth; position: relative;
        }

        /* نظام التبويبات (Footer) */
        nav {
            background: var(--glass); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 10px;
            border-top: 1px solid var(--glass-border); transform: translateZ(30px);
        }

        .nav-item { color: #888; cursor: pointer; text-align: center; font-size: 12px; transition: 0.3s; }
        .nav-item.active { color: var(--primary); transform: scale(1.1); text-shadow: 0 0 10px var(--primary); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }

        /* الفقاعات والمنشورات (3D Effect) */
        .card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 15px; margin-bottom: 15px;
            box-shadow: var(--shadow); transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px) rotateX(2deg); }

        /* رسائل الشات */
        .msg-container { display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; position: relative; }
        .msg.me { align-self: flex-end; background: linear-gradient(135deg, var(--secondary), #4a00e0); }
        .msg.other { align-self: flex-start; background: #1a1b25; border: 1px solid #333; }

        /* Input Box */
        .input-area {
            padding: 15px; display: flex; gap: 10px; align-items: center;
            background: rgba(0,0,0,0.5);
        }
        .input-area input {
            flex: 1; background: #111; border: 1px solid #333;
            padding: 12px; border-radius: 25px; color: #fff; outline: none;
        }

        /* زر الإضافة العائم */
        .fab {
            position: fixed; bottom: 80px; left: 20px;
            width: 50px; height: 50px; background: var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #000; font-size: 24px; box-shadow: 0 0 20px var(--primary);
            cursor: pointer; z-index: 500;
        }

        /* شاشات فرعية */
        .screen { display: none; height: 100%; }
        .screen.active { display: block; }

        /* ميديا المنشورات */
        .post-media { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #333; }
        .user-tag { font-size: 12px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="access-overlay">
    <h2 style="color: var(--primary); margin-bottom: 20px;">ادخل رمز الوصول</h2>
    <input type="password" id="access-code" class="input-access" placeholder="••••••••">
    <p id="access-error" style="color: red; margin-top: 10px; display: none;">الرمز غير صحيح!</p>
</div>

<div class="app-shell" id="app-content" style="display: none;">
    <header>
        <div id="current-channel-title">القناة العامة</div>
        <div style="display: flex; gap: 15px;">
            <i class="fas fa-search"></i>
            <i class="fas fa-bell"></i>
        </div>
    </header>

    <main id="main-scroll">
        <div id="chat-screen" class="screen active">
            <div id="chat-messages" class="msg-container"></div>
        </div>

        <div id="feed-screen" class="screen">
            <div id="feed-posts"></div>
        </div>

        <div id="channels-screen" class="screen">
            <h3 style="color: var(--primary);">القنوات المتوفرة</h3>
            <div id="channels-list"></div>
            <button onclick="createNewChannel()" style="width: 100%; padding: 15px; border-radius: 10px; background: var(--secondary); color: white; border: none; margin-top: 10px;">انشاء قناة جديدة +</button>
        </div>
    </main>

    <div class="input-area" id="global-input-area">
        <i class="fas fa-plus-circle icon-btn" onclick="document.getElementById('file-upload').click()"></i>
        <input type="file" id="file-upload" hidden accept="image/*,video/*">
        <input type="text" id="main-input" placeholder="اكتب شيئاً...">
        <i class="fas fa-paper-plane" style="color: var(--primary); cursor: pointer;" id="send-btn"></i>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchScreen('chat')">
            <i class="fas fa-comments"></i> الشات
        </div>
        <div class="nav-item" onclick="switchScreen('feed')">
            <i class="fas fa-hashtag"></i> المنشورات
        </div>
        <div class="nav-item" onclick="switchScreen('channels')">
            <i class="fas fa-layer-group"></i> القنوات
        </div>
        <div class="nav-item" onclick="logout()">
            <i class="fas fa-user-circle"></i> ملفي
        </div>
    </nav>
</div>

<div id="login-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9000; align-items:center; justify-content:center;">
    <div class="card" style="width:85%; max-width:350px; text-align:center;">
        <h3 style="color:var(--primary)">إنشاء ملف شخصي</h3>
        <img id="reg-preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--primary); cursor:pointer;">
        <input type="file" id="reg-file" hidden>
        <input type="text" id="reg-name" placeholder="اسمك المستعار" style="width:100%; padding:12px; margin:15px 0; border-radius:10px; background:#111; border:1px solid #333; color:#fff;">
        <button onclick="completeRegistration()" style="width:100%; padding:12px; background:var(--primary); border:none; border-radius:10px; font-weight:bold;">دخول</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // إعدادات الفايربيس (نفس إعداداتك السابقة)
    const firebaseConfig = {
        apiKey: "AIzaSyBLtjHJIMkLE3CE_WZSDpWQTx_cpTcpycM",
        authDomain: "studyproject-1466b.firebaseapp.com",
        projectId: "studyproject-1466b",
        storageBucket: "studyproject-1466b.firebasestorage.app",
        messagingSenderId: "589724771483",
        appId: "1:589724771483:web:1c53636da586d2c787923e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- المتغيرات الأساسية ---
    let myUser = JSON.parse(localStorage.getItem('enjaz_pro_user'));
    let currentScreen = 'chat';
    let activeChannel = 'general';

    // --- نظام حماية الدخول ---
    document.getElementById('access-code').addEventListener('input', (e) => {
        if(e.target.value === '166277399') {
            document.getElementById('access-overlay').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
            checkUser();
        } else if(e.target.value.length >= 9) {
            document.getElementById('access-error').style.display = 'block';
        }
    });

    function checkUser() {
        if(!myUser) {
            document.getElementById('login-overlay').style.display = 'flex';
        } else {
            initApp();
        }
    }

    // --- تسجيل مستخدم جديد ---
    window.completeRegistration = () => {
        const name = document.getElementById('reg-name').value;
        const img = document.getElementById('reg-preview').src;
        if(!name) return;
        myUser = { id: 'u' + Date.now(), name, img };
        localStorage.setItem('enjaz_pro_user', JSON.stringify(myUser));
        location.reload();
    };

    document.getElementById('reg-preview').onclick = () => document.getElementById('reg-file').click();
    document.getElementById('reg-file').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => document.getElementById('reg-preview').src = ev.target.result;
        reader.readAsDataURL(e.target.files[0]);
    };

    // --- نظام التنقل ---
    window.switchScreen = (s) => {
        currentScreen = s;
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(s + '-screen').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        // تغيير مكان الإدخال حسب الشاشة
        document.getElementById('global-input-area').style.display = (s === 'channels') ? 'none' : 'flex';
    };

    // --- إدارة البيانات (الشات) ---
    function initApp() {
        // الاستماع لرسائل الشات في القناة الحالية
        onValue(ref(db, 'chats/' + activeChannel), (snap) => {
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            snap.forEach(child => {
                const d = child.val();
                const isMe = d.uid === myUser.id;
                let content = d.type === 'text' ? d.msg : 
                             (d.type === 'img' ? `<img src="${d.media}" class="post-media">` : `<video src="${d.media}" controls class="post-media"></video>`);
                
                container.innerHTML += `
                    <div class="msg ${isMe ? 'me' : 'other'}">
                        <div class="user-tag">${d.u}</div>
                        <div>${content}</div>
                    </div>
                `;
            });
            document.getElementById('main-scroll').scrollTop = container.scrollHeight;
        });

        // الاستماع للمنشورات (السوشيال)
        onValue(ref(db, 'social_feed'), (snap) => {
            const container = document.getElementById('feed-posts');
            container.innerHTML = '';
            let posts = [];
            snap.forEach(child => { posts.unshift({id: child.key, ...child.val()}); });
            
            posts.forEach(p => {
                let mediaHtml = p.type === 'img' ? `<img src="${p.media}" class="post-media">` : 
                                (p.type === 'vid' ? `<video src="${p.media}" controls class="post-media"></video>` : '');
                container.innerHTML += `
                    <div class="card">
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                            <img src="${p.uimg}" style="width:35px; height:35px; border-radius:50%;">
                            <div>
                                <div style="font-weight:bold; font-size:14px;">${p.uname}</div>
                                <div style="font-size:10px; color:#888;">منذ قليل</div>
                            </div>
                        </div>
                        <div style="font-size:14px;">${p.txt}</div>
                        ${mediaHtml}
                        <div style="margin-top:10px; display:flex; gap:20px; color:#888; font-size:13px;">
                            <span><i class="far fa-heart"></i> 0</span>
                            <span><i class="far fa-comment"></i> 0</span>
                        </div>
                    </div>
                `;
            });
        });
    }

    // --- إرسال البيانات ---
    document.getElementById('send-btn').onclick = () => {
        const val = document.getElementById('main-input').value;
        if(!val) return;

        if(currentScreen === 'chat') {
            push(ref(db, 'chats/' + activeChannel), {
                uid: myUser.id, u: myUser.name, msg: val, type: 'text', time: serverTimestamp()
            });
        } else if(currentScreen === 'feed') {
            push(ref(db, 'social_feed'), {
                uid: myUser.id, uname: myUser.name, uimg: myUser.img, txt: val, type: 'text', time: serverTimestamp()
            });
        }
        document.getElementById('main-input').value = '';
    };

    // رفع الميديا (صور/فيديو)
    document.getElementById('file-upload').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        const type = file.type.startsWith('image') ? 'img' : 'vid';
        reader.onload = (ev) => {
            if(currentScreen === 'chat') {
                push(ref(db, 'chats/' + activeChannel), {
                    uid: myUser.id, u: myUser.name, media: ev.target.result, type, time: serverTimestamp()
                });
            } else {
                push(ref(db, 'social_feed'), {
                    uid: myUser.id, uname: myUser.name, uimg: myUser.img, txt: '', media: ev.target.result, type, time: serverTimestamp()
                });
            }
        };
        reader.readAsDataURL(file);
    };

    // --- نظام القنوات ---
    window.createNewChannel = () => {
        const name = prompt("اسم القناة الجديدة:");
        if(!name) return;
        const id = 'ch_' + Date.now();
        set(ref(db, 'channels_meta/' + id), { name, owner: myUser.id });
        alert("تم إنشاء القناة!");
    };

    onValue(ref(db, 'channels_meta'), (snap) => {
        const list = document.getElementById('channels-list');
        list.innerHTML = `<div class="card" onclick="joinChannel('general', 'القناة العامة')" style="cursor:pointer; border-left:4px solid var(--primary)"># القناة العامة (للكل)</div>`;
        snap.forEach(child => {
            const c = child.val();
            list.innerHTML += `<div class="card" onclick="joinChannel('${child.key}', '${c.name}')" style="cursor:pointer;"># ${c.name}</div>`;
        });
    });

    window.joinChannel = (id, name) => {
        activeChannel = id;
        document.getElementById('current-channel-title').innerText = name;
        switchScreen('chat');
        initApp(); // إعادة تحميل الرسائل للقناة الجديدة
    };

    // --- نظام الخلفية (الذرات) ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let stars = Array(100).fill().map(() => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, s: Math.random()*0.5 }));
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#fff";
        stars.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
            s.y += s.s; if(s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(animate);
    }
    animate();

</script>
</body>
</html>
